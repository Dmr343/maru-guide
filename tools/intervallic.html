<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interval Atlas</title>
  <style>
    :root {
      --bg:#0e0e0e; --surface:#141414; --surface2:#1a1a1a; --border:#222;
      --text:#e8d5b0; --text-dim:#666; --text-mid:#999; --gold:#d4a847; --gold-dim:#3a2e0a;
      --radius:10px; --font:'Trebuchet MS','Segoe UI',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{zoom:1.4}
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding:18px}
    a.back{color:var(--text-dim);font-size:11px;text-decoration:none;letter-spacing:.1em;text-transform:uppercase}
    a.back:hover{color:var(--gold)}
    h1{font-size:22px;font-weight:300;color:var(--gold);letter-spacing:.06em;margin:8px 0 4px}
    .subtitle{color:var(--text-mid);font-size:12px;margin-bottom:14px}

    .panel-layout{display:grid;grid-template-columns:1fr 320px;gap:14px}
    .panel-layout.collapsed{grid-template-columns:1fr}
    .panel-layout.collapsed .side-panel{display:none}
    .panel-layout.collapsed ~ #atlas-panel-show{display:flex}
    @media(max-width:1100px){.panel-layout{grid-template-columns:1fr}}

    .fretboard-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;overflow-x:auto;min-width:0}
    #atlas-fretboard{display:block;width:100%;height:auto;max-width:1600px}
    .side-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;min-height:300px;position:relative}
    .panel-toggle{position:absolute;top:8px;right:8px;background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:var(--font);font-size:14px;line-height:1;padding:2px 8px;border-radius:5px;cursor:pointer;z-index:2}
    .panel-toggle:hover{border-color:var(--gold);color:var(--gold)}
    #atlas-panel-show{display:none;position:fixed;top:18px;right:18px;background:var(--surface);border:1px solid var(--border);color:var(--text-mid);font-family:var(--font);font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:6px 10px;border-radius:6px;cursor:pointer;align-items:center;gap:6px;z-index:50;box-shadow:0 4px 12px rgba(0,0,0,.4)}
    #atlas-panel-show:hover{border-color:var(--gold);color:var(--gold)}
    .side-panel h3{font-size:11px;letter-spacing:.15em;color:var(--text-dim);text-transform:uppercase;margin-bottom:10px}

    .row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;font-size:12px;color:var(--text-mid)}
    .row label{display:inline-flex;gap:5px;align-items:center}

    select, input[type=number], input[type=text]{
      background:var(--surface2);border:1px solid var(--border);color:var(--text);
      font-family:var(--font);font-size:12px;padding:5px 8px;border-radius:6px
    }
    .btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:6px 12px;border-radius:6px;cursor:pointer}
    .btn:hover{border-color:var(--gold);color:var(--gold)}
    .btn.primary{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}
    .btn.primary:hover{background:#f0c060}
    .btn.danger{color:#e74c3c;border-color:#3a1a1a}

    .layer-toggles{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0 12px;padding:8px 12px;background:var(--surface2);border-radius:8px}
    .layer-toggle{display:inline-flex;gap:5px;align-items:center;font-size:12px;color:var(--text-mid);cursor:pointer}

    .progression-bar{display:flex;gap:6px;background:var(--surface2);padding:8px;border-radius:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;min-height:48px}
    .prog-chord{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-width:60px;position:relative;cursor:pointer;transition:transform .12s, opacity .12s, box-shadow .12s;user-select:none}
    .prog-chord:hover{box-shadow:0 0 0 1px var(--gold)}
    .prog-chord.active{border-color:var(--gold);background:#1d1810;box-shadow:0 0 10px rgba(212,168,71,.3)}
    .prog-chord.beat{transform:scale(1.06);transition:transform .09s ease-out}
    .prog-chord.downbeat{background:#3a2e0a;box-shadow:0 0 18px rgba(212,168,71,.7);transition:background .14s ease-out, box-shadow .14s ease-out}
    .prog-chord.dragging{opacity:.45;transform:scale(.95)}
    .prog-chord.drag-over{outline:2px dashed var(--gold);outline-offset:2px}
    .prog-chord.in-loop{box-shadow:inset 0 -3px 0 #9b59b6}
    .prog-chord[draggable=true]{cursor:grab}
    .prog-chord[draggable=true]:active{cursor:grabbing}
    .prog-chord .pc-bars-vis{font-size:8px;color:var(--text-dim);letter-spacing:1px;line-height:1}
    .prog-chord .pc-del{position:absolute;top:1px;right:2px;background:transparent;border:none;color:var(--text-dim);font-size:13px;line-height:1;padding:1px 4px;cursor:pointer;opacity:0;transition:opacity .12s,color .12s;border-radius:3px}
    .prog-chord:hover .pc-del{opacity:.7}
    .prog-chord .pc-del:hover{opacity:1;color:#e74c3c;background:rgba(231,76,60,.12)}
    .btn.playing{background:#e74c3c;color:#fff;border-color:#e74c3c;animation:pulse 1s ease-in-out infinite}
    .btn.paused{background:#f0c060;color:#000;border-color:#f0c060}
    .btn.tap-pulse{transform:scale(1.1);transition:transform .12s}
    .beat-meter{display:inline-flex;gap:4px;padding:2px 6px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;align-items:center;height:28px}
    .beat-dot{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:50%;background:var(--bg);border:1px solid var(--border);font-size:10px;font-weight:700;color:var(--text-dim);transition:background .08s,color .08s,transform .08s}
    .beat-dot.downbeat{color:var(--gold);border-color:var(--gold-dim)}
    .beat-dot.on{background:var(--text);color:#000;transform:scale(1.18)}
    .beat-dot.downbeat.on{background:var(--gold);color:#000}
    .toggle{display:inline-flex;gap:5px;align-items:center;font-size:12px;color:var(--text-mid);cursor:pointer}
    @keyframes pulse{50%{opacity:.7}}
    .filters-block{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:10px}
    .filters-block summary{cursor:pointer;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;outline:none;list-style:none}
    .filters-block summary::-webkit-details-marker{display:none}
    .filters-block[open] summary{color:var(--gold)}
    .edit-popover{position:fixed;background:var(--surface);border:1px solid var(--gold);border-radius:8px;padding:10px;box-shadow:0 8px 24px rgba(0,0,0,.6);z-index:1000;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .edit-popover-title{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;width:100%}
    .edit-popover-actions{display:flex;gap:4px;margin-left:auto}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:var(--surface);border:1px solid var(--gold);border-radius:10px;padding:18px;width:min(720px,100%);max-height:80vh;display:flex;flex-direction:column;gap:10px}
    .modal-header{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .modal-header h3{color:var(--gold);font-size:14px;letter-spacing:.1em;text-transform:uppercase}
    .modal-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);flex-wrap:wrap}
    .modal-tab{background:transparent;border:none;color:var(--text-mid);font-family:var(--font);font-size:12px;padding:6px 12px;cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.04em}
    .modal-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
    .modal-list{overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;padding:6px 2px}
    .preset-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:border-color .15s,transform .12s}
    .preset-card:hover{border-color:var(--gold);transform:translateY(-1px)}
    .preset-card-name{font-weight:700;color:var(--gold);font-size:13px;margin-bottom:4px}
    .preset-card-chords{font-size:11px;color:var(--text-mid);line-height:1.5}
    .fav-list{display:flex;flex-direction:column;gap:4px;margin-top:8px}
    .fav-item{display:flex;justify-content:space-between;align-items:center;gap:6px;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:12px}
    .fav-item:hover{border-color:var(--gold)}
    .fav-item-name{color:var(--text);cursor:pointer;flex:1}
    .fav-item-name:hover{color:var(--gold)}
    .fav-item-del{cursor:pointer;color:var(--text-dim);padding:2px 6px}
    .fav-item-del:hover{color:#e74c3c}
    .prog-chord .pc-name{font-weight:700;color:var(--gold);font-size:13px}

    .legend{display:flex;gap:6px;font-size:11px;color:var(--text-mid);flex-wrap:wrap;margin-top:8px;align-items:center}
    .legend-dot{display:inline-block;width:10px;height:10px;border-radius:50%;vertical-align:middle;margin-right:4px}
    .legend-toggle{background:transparent;border:1px solid var(--border);color:var(--text-mid);font-family:var(--font);font-size:11px;padding:3px 8px;border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;gap:0;transition:opacity .12s,border-color .12s}
    .legend-toggle:hover{border-color:var(--gold);color:var(--text)}
    .legend-toggle.off{opacity:.35;text-decoration:line-through}
    .legend-toggle.is-chord{border-bottom:2px solid var(--gold)}
    .legend-toggle.reset{color:var(--gold);border-color:var(--gold-dim);margin-left:8px}

    .empty-state{padding:30px 14px;text-align:center;color:var(--text-dim);font-size:12px;line-height:1.6}
    .mode-tabs{display:flex;gap:6px;margin-bottom:10px;align-items:center}
    .mode-tab{background:transparent;border:1px solid var(--border);color:var(--text-mid);font-family:var(--font);font-size:12px;padding:4px 12px;border-radius:6px;cursor:pointer}
    .mode-tab.active{background:var(--surface2);border-color:var(--gold);color:var(--gold)}
    .palette-pane{margin-bottom:6px}
    .diat-chips{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:8px}
    .diat-chip{background:var(--bg);border:1px solid var(--border);border-left-width:3px;border-radius:6px;padding:6px 8px;cursor:pointer;text-align:left;color:var(--text);font-family:var(--font);transition:transform .12s,filter .12s}
    .diat-chip:hover{filter:brightness(1.3);transform:translateY(-1px)}
    .diat-chip:active{transform:translateY(0)}
    .diat-chip-row{display:flex;justify-content:space-between;align-items:baseline;gap:6px}
    .diat-chip-roman{font-style:italic;font-weight:700;font-size:13px;letter-spacing:.04em;color:var(--text-mid)}
    .diat-chip-name{font-size:15px;font-weight:700;color:var(--gold)}
    .diat-chip-notes{font-size:10px;color:var(--text-mid);margin-top:2px;letter-spacing:.02em}
  </style>
</head>
<body>

  <a href="index.html" class="back">← Volver</a>
  <h1>Interval Atlas</h1>
  <p class="subtitle">Intervalos del mástil sobre tu progresión, en todas las direcciones.</p>

  <div class="panel-layout" id="atlas-panel-layout">
    <div class="fretboard-wrap">
      <div class="progression-bar" id="atlas-bar"></div>

      <div class="row">
        <button class="btn primary" id="atlas-play">▶ Play</button>
        <button class="btn" id="atlas-prev">←</button>
        <button class="btn" id="atlas-next">→</button>
        <label>BPM <input type="number" id="atlas-bpm" value="80" min="40" max="220" style="width:60px"></label>
        <button class="btn" id="atlas-tap" title="Tap tempo (T): clickeá al ritmo">TAP</button>
        <label title="Compás: clicks por barra antes de acentuar el 1">Compás
          <select id="atlas-bpc" style="width:64px">
            <option value="2">2/4</option>
            <option value="3">3/4</option>
            <option value="4" selected>4/4</option>
            <option value="5">5/4</option>
            <option value="6">6/8</option>
            <option value="7">7/8</option>
          </select>
        </label>
        <div id="atlas-beat-meter" class="beat-meter" title="Posición en el compás"></div>
        <select id="atlas-direction">
          <option value="all">Dirección: Todas</option>
          <option value="horizontal">Horizontal</option>
          <option value="vertical">Vertical</option>
          <option value="diagonal">Diagonal</option>
        </select>
      </div>

      <details id="atlas-options-block" class="filters-block" open>
        <summary>▾ Capas y opciones</summary>
        <div class="layer-toggles" style="margin-top:8px">
          <label class="layer-toggle"><input type="checkbox" id="atlas-l-chord" checked> Chord tones</label>
          <label class="layer-toggle"><input type="checkbox" id="atlas-l-scale"> Escala asociada</label>
          <label class="layer-toggle"><input type="checkbox" id="atlas-l-tensions"> Tensiones</label>
          <label class="layer-toggle"><input type="checkbox" id="atlas-l-approach"> Próximo acorde</label>
          <label class="layer-toggle"><input type="checkbox" id="atlas-l-all"> Todas las 12</label>
          <label class="layer-toggle"><input type="checkbox" id="atlas-show-names"> Nombres de nota</label>
          <span style="border-left:1px solid var(--border);height:18px;margin:0 6px"></span>
          <label class="layer-toggle" title="Conteo previo de 4 clicks antes de empezar"><input type="checkbox" id="atlas-preroll"> Pre-roll</label>
          <label class="layer-toggle" title="Silenciar click del metrónomo"><input type="checkbox" id="atlas-mute-click"> 🔇 Mute click</label>
        </div>
      </details>

      <details id="atlas-filters-block" class="filters-block">
        <summary>▾ Filtros del mástil</summary>
        <div class="row" style="margin-top:8px">
          <label>Trastes
            <input type="number" id="atlas-fret-min" value="0" min="0" max="22" style="width:48px">
            <span>–</span>
            <input type="number" id="atlas-fret-max" value="22" min="0" max="22" style="width:48px">
          </label>
          <label>Cuerdas
            <input type="checkbox" id="atlas-s-1" data-string="1" checked>1
            <input type="checkbox" id="atlas-s-2" data-string="2" checked>2
            <input type="checkbox" id="atlas-s-3" data-string="3" checked>3
            <input type="checkbox" id="atlas-s-4" data-string="4" checked>4
            <input type="checkbox" id="atlas-s-5" data-string="5" checked>5
            <input type="checkbox" id="atlas-s-6" data-string="6" checked>6
          </label>
          <button class="btn" id="atlas-reset" style="margin-left:auto">Reset filtros</button>
        </div>
      </details>

      <svg id="atlas-fretboard" viewBox="0 0 920 220" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="legend" id="atlas-legend"></div>
    </div>

    <div class="side-panel">
      <button class="panel-toggle" id="atlas-panel-hide" type="button" title="Ocultar editor (más espacio para el diapasón)" aria-label="Ocultar editor">›</button>
      <h3>Editor de progresión</h3>

      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="libre">Libre</button>
        <button class="mode-tab" data-mode="diatonic">Diatónico</button>
        <button class="btn danger" id="atlas-clear-prog" title="Limpiar (Esc)" style="margin-left:auto">Limpiar</button>
      </div>

      <div id="atlas-palette-libre" class="palette-pane">
        <div class="row">
          <select id="atlas-new-root">
            <option>C</option><option>C#</option><option>D</option><option>D#</option>
            <option>E</option><option>F</option><option>F#</option><option>G</option>
            <option>G#</option><option>A</option><option>A#</option><option>B</option>
          </select>
          <select id="atlas-new-quality" style="flex:1">
            <option value="maj7">Mayor 7  · 1 3 5 7</option>
            <option value="min7">menor 7  · 1 b3 5 b7</option>
            <option value="dom7">Dominante 7  · 1 3 5 b7</option>
            <option value="dim7">Disminuido  · 1 b3 b5 bb7</option>
            <option value="m7b5">Semidisminuido  · 1 b3 b5 b7</option>
          </select>
          <button class="btn primary" id="atlas-add">+ Agregar</button>
        </div>
      </div>

      <div id="atlas-palette-diatonic" class="palette-pane" style="display:none">
        <div class="row">
          <label>Tónica
            <select id="atlas-diat-key">
              <option>C</option><option>C#</option><option>D</option><option>D#</option>
              <option>E</option><option>F</option><option>F#</option><option>G</option>
              <option>G#</option><option>A</option><option>A#</option><option>B</option>
            </select>
          </label>
          <label>Modo
            <select id="atlas-diat-mode">
              <option value="major">Mayor</option>
              <option value="minor">Menor natural</option>
              <option value="dorian">Dorian</option>
              <option value="phrygian">Phrygian</option>
              <option value="lydian">Lydian</option>
              <option value="mixolydian">Mixolydian</option>
              <option value="locrian">Locrian</option>
              <option value="harmonic_minor">Armónica menor</option>
              <option value="melodic_minor">Melódica menor</option>
            </select>
          </label>
        </div>
        <div id="atlas-diat-chips" class="diat-chips"></div>
      </div>

      <div class="row" style="margin-top:10px">
        <button class="btn" id="atlas-presets-btn">📚 Presets</button>
        <button class="btn" id="atlas-fav-save">★ Guardar</button>
      </div>
      <div id="atlas-favorites"></div>

      <h3 style="margin-top:14px">Acorde activo</h3>
      <div id="atlas-info" class="empty-state">—</div>
    </div>

    <!-- Modal de presets -->
    <div class="modal-backdrop" id="atlas-presets-modal" style="display:none">
      <div class="modal">
        <div class="modal-header">
          <h3>Presets por género</h3>
          <button class="btn" id="atlas-presets-close">Cerrar</button>
        </div>
        <div class="modal-tabs" id="atlas-presets-tabs"></div>
        <div class="modal-list" id="atlas-presets-list"></div>
      </div>
    </div>
  </div>

  <button id="atlas-panel-show" type="button" title="Mostrar editor de progresión" aria-label="Mostrar editor">‹ Editor</button>

  <script src="./shared/theory.js"></script>
  <script src="./shared/theory-modes.js"></script>
  <script src="./shared/fretboard.js"></script>
  <script src="./shared/storage.js"></script>
  <script src="./shared/positions.js"></script>
  <script src="./shared/metronome.js"></script>
  <script src="./intervallic/audio.js"></script>
  <script src="./intervallic/presets.js"></script>
  <script src="./intervallic/progression-model.js"></script>
  <script src="./intervallic/transport-controller.js"></script>
  <script src="./intervallic/fretboard-renderer.js"></script>
  <script src="./intervallic/persistence.js"></script>
  <script src="./intervallic/atlas.js"></script>

  <script>
    window.IntervalAtlas.init();
  </script>
</body>
</html>
