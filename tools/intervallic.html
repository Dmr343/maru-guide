<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interval Atlas</title>
  <style>
    :root {
      --bg:#0e0e0e; --surface:#141414; --surface2:#1a1a1a; --border:#222;
      --text:#e8d5b0; --text-dim:#666; --text-mid:#999; --gold:#d4a847;
      --radius:10px; --font:'Trebuchet MS','Segoe UI',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{zoom:1.4}
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding:18px}
    a.back{color:var(--text-dim);font-size:11px;text-decoration:none;letter-spacing:.1em;text-transform:uppercase}
    a.back:hover{color:var(--gold)}
    h1{font-size:22px;font-weight:300;color:var(--gold);letter-spacing:.06em;margin:8px 0 4px}
    .subtitle{color:var(--text-mid);font-size:12px;margin-bottom:14px}

    .panel-layout{display:grid;grid-template-columns:1fr 320px;gap:14px}
    @media(max-width:1100px){.panel-layout{grid-template-columns:1fr}}

    .fretboard-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;overflow-x:auto}
    .side-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;min-height:300px}
    .side-panel h3{font-size:11px;letter-spacing:.15em;color:var(--text-dim);text-transform:uppercase;margin-bottom:10px}

    .row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;font-size:12px;color:var(--text-mid)}
    .row label{display:inline-flex;gap:5px;align-items:center}

    select, input[type=number], input[type=text]{
      background:var(--surface2);border:1px solid var(--border);color:var(--text);
      font-family:var(--font);font-size:12px;padding:5px 8px;border-radius:6px
    }
    .btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:6px 12px;border-radius:6px;cursor:pointer}
    .btn:hover{border-color:var(--gold);color:var(--gold)}
    .btn.primary{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}
    .btn.primary:hover{background:#f0c060}
    .btn.danger{color:#e74c3c;border-color:#3a1a1a}

    .layer-toggles{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0 12px;padding:8px 12px;background:var(--surface2);border-radius:8px}
    .layer-toggle{display:inline-flex;gap:5px;align-items:center;font-size:12px;color:var(--text-mid);cursor:pointer}

    .progression-bar{display:flex;gap:6px;background:var(--surface2);padding:8px;border-radius:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;min-height:48px}
    .prog-chord{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:60px;position:relative;cursor:pointer}
    .prog-chord.active{border-color:var(--gold);background:#1d1810;box-shadow:0 0 10px rgba(212,168,71,.3)}
    .prog-chord .pc-name{font-weight:700;color:var(--gold)}
    .prog-chord .pc-bars{font-size:9px;color:var(--text-dim)}
    .prog-chord .pc-del{position:absolute;top:1px;right:4px;font-size:11px;color:var(--text-dim);cursor:pointer}
    .prog-chord .pc-del:hover{color:#e74c3c}

    .legend{display:flex;gap:14px;font-size:11px;color:var(--text-mid);flex-wrap:wrap;margin-top:8px}
    .legend-dot{display:inline-block;width:10px;height:10px;border-radius:50%;vertical-align:middle;margin-right:4px}

    .empty-state{padding:30px 14px;text-align:center;color:var(--text-dim);font-size:12px;line-height:1.6}
  </style>
</head>
<body>

  <a href="index.html" class="back">← Volver</a>
  <h1>Interval Atlas</h1>
  <p class="subtitle">Intervalos del mástil sobre tu progresión, en todas las direcciones.</p>

  <div class="panel-layout">
    <div class="fretboard-wrap">
      <div class="progression-bar" id="atlas-bar"></div>

      <div class="row">
        <button class="btn primary" id="atlas-play">▶ Play</button>
        <button class="btn" id="atlas-stop">■ Stop</button>
        <button class="btn" id="atlas-prev">←</button>
        <button class="btn" id="atlas-next">→</button>
        <label>BPM <input type="number" id="atlas-bpm" value="80" min="40" max="220" style="width:60px"></label>
        <label>Compases <select id="atlas-bpc">
          <option value="2">2</option>
          <option value="4" selected>4</option>
          <option value="8">8</option>
        </select></label>
        <select id="atlas-direction">
          <option value="all">Dirección: Todas</option>
          <option value="horizontal">Horizontal</option>
          <option value="vertical">Vertical</option>
          <option value="diagonal">Diagonal</option>
        </select>
      </div>

      <div class="layer-toggles">
        <label class="layer-toggle"><input type="checkbox" id="atlas-l-chord" checked> Chord tones</label>
        <label class="layer-toggle"><input type="checkbox" id="atlas-l-scale"> Escala asociada</label>
        <label class="layer-toggle"><input type="checkbox" id="atlas-l-tensions"> Tensiones</label>
        <label class="layer-toggle"><input type="checkbox" id="atlas-l-approach"> Próximo acorde</label>
        <label class="layer-toggle"><input type="checkbox" id="atlas-l-all"> Todas las 12</label>
        <label class="layer-toggle"><input type="checkbox" id="atlas-show-names"> Nombres de nota</label>
      </div>

      <div class="row" style="background:var(--surface2);padding:8px 12px;border-radius:8px;margin-bottom:10px">
        <label>Trastes
          <input type="number" id="atlas-fret-min" value="0" min="0" max="22" style="width:48px">
          <span>–</span>
          <input type="number" id="atlas-fret-max" value="22" min="0" max="22" style="width:48px">
        </label>
        <label>Cuerdas
          <input type="checkbox" id="atlas-s-1" data-string="1" checked>1
          <input type="checkbox" id="atlas-s-2" data-string="2" checked>2
          <input type="checkbox" id="atlas-s-3" data-string="3" checked>3
          <input type="checkbox" id="atlas-s-4" data-string="4" checked>4
          <input type="checkbox" id="atlas-s-5" data-string="5" checked>5
          <input type="checkbox" id="atlas-s-6" data-string="6" checked>6
        </label>
        <button class="btn" id="atlas-reset" style="margin-left:auto">Reset filtros</button>
      </div>

      <svg id="atlas-fretboard" width="920" height="220"></svg>
      <div class="legend" id="atlas-legend"></div>
    </div>

    <div class="side-panel">
      <h3>Editor de progresión</h3>
      <div class="row">
        <select id="atlas-new-root">
          <option>C</option><option>C#</option><option>D</option><option>D#</option>
          <option>E</option><option>F</option><option>F#</option><option>G</option>
          <option>G#</option><option>A</option><option>A#</option><option>B</option>
        </select>
        <select id="atlas-new-quality" style="min-width:180px">
          <option value="maj7">Mayor 7        · 1 3 5 7</option>
          <option value="min7">menor 7        · 1 b3 5 b7</option>
          <option value="dom7">Dominante 7    · 1 3 5 b7</option>
          <option value="dim7">Disminuido     · 1 b3 b5 bb7</option>
          <option value="m7b5">Semidisminuido · 1 b3 b5 b7</option>
        </select>
        <button class="btn primary" id="atlas-add">+ Agregar</button>
        <button class="btn danger" id="atlas-clear-prog" title="Limpiar (Esc)">Limpiar</button>
      </div>

      <h3 style="margin-top:14px">Acorde activo</h3>
      <div id="atlas-info" class="empty-state">—</div>
    </div>
  </div>

  <script src="./shared/theory.js"></script>
  <script src="./shared/theory-modes.js"></script>
  <script src="./shared/fretboard.js"></script>
  <script src="./shared/storage.js"></script>
  <script src="./shared/positions.js"></script>
  <script src="./shared/metronome.js"></script>
  <script src="./intervallic/audio.js"></script>
  <script src="./intervallic/atlas.js"></script>

  <script>
    window.IntervalAtlas.init();
  </script>
</body>
</html>
