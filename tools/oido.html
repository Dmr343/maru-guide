<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrenador de Oído</title>
  <style>
    :root{
      --bg:#0e0e0e;--surface:#141414;--surface2:#1a1a1a;--border:#222;
      --text:#e8d5b0;--text-dim:#555;--text-mid:#888;
      --accent:#9b59b6;--accent-dim:#1a0a2a;
      --gold:#d4a847;--green:#2ecc71;--red:#e74c3c;
      --radius:10px;--font:'Trebuchet MS','Segoe UI',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{zoom:1.4;}
    body{background:var(--bg);color:var(--text);font-family:var(--font);padding:16px 12px 40px;min-height:100vh;}
    .back{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--text-dim);font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;transition:color .15s;}
    .back:hover{color:var(--accent);}
    .header{text-align:center;margin-bottom:20px;}
    .header-label{font-size:10px;letter-spacing:.3em;color:var(--text-dim);text-transform:uppercase;margin-bottom:4px;}
    .header h1{font-size:clamp(16px,4vw,24px);font-weight:300;color:var(--accent);letter-spacing:.08em;}

    /* Mode selector */
    .mode-cards{display:flex;gap:12px;justify-content:center;max-width:560px;margin:0 auto 24px;flex-wrap:wrap;}
    .mode-card{
      flex:1;min-width:200px;padding:16px;border-radius:var(--radius);border:2px solid var(--border);
      background:var(--surface);cursor:pointer;transition:all .2s;text-align:center;
    }
    .mode-card:hover{border-color:var(--accent);}
    .mode-card.active{border-color:var(--accent);background:var(--accent-dim);box-shadow:0 0 20px rgba(155,89,182,.15);}
    .mode-card-icon{font-size:28px;margin-bottom:8px;}
    .mode-card-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:4px;}
    .mode-card-desc{font-size:11px;color:var(--text-dim);line-height:1.4;}

    /* Level selector */
    .level-row{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}
    .level-btn{
      padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);
      color:var(--text-dim);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;
    }
    .level-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
    .level-btn.done{border-color:var(--green);color:var(--green);background:#0a1a0a;}

    /* Quiz card */
    .quiz-card{max-width:480px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px;}
    .quiz-question{text-align:center;font-size:15px;color:var(--text);margin-bottom:20px;line-height:1.6;}
    .quiz-question .highlight{color:var(--accent);font-weight:700;font-size:18px;}

    /* Play button */
    .play-sound-btn{
      display:block;margin:0 auto 20px;padding:14px 32px;border-radius:10px;border:none;
      background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer;
      box-shadow:0 0 20px rgba(155,89,182,.3);transition:all .2s;
    }
    .play-sound-btn:hover{background:#8e44ad;transform:scale(1.03);}
    .play-sound-btn:active{transform:scale(0.98);}

    /* Options */
    .options{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px;}
    .opt-btn{
      padding:12px 18px;border-radius:8px;border:2px solid #333;background:var(--surface2);
      color:#888;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;min-width:80px;text-align:center;
    }
    .opt-btn:hover{border-color:#666;color:#ccc;}
    .opt-btn.correct{border-color:var(--green);background:#0a1a0a;color:var(--green);}
    .opt-btn.wrong{border-color:var(--red);background:#1a0a0a;color:var(--red);}
    .opt-btn:disabled{cursor:default;}

    /* Feedback */
    .feedback{text-align:center;min-height:24px;font-size:14px;margin-bottom:12px;}
    .feedback.correct{color:var(--green);}
    .feedback.wrong{color:var(--red);}

    .next-btn{
      display:block;width:100%;padding:11px;border-radius:8px;border:1px solid var(--accent);
      background:var(--accent-dim);color:var(--accent);font-size:13px;font-weight:700;cursor:pointer;
      transition:all .15s;margin-top:8px;
    }
    .next-btn:hover{background:var(--accent);color:#fff;}

    /* Score */
    .score-bar{display:flex;gap:16px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;}
    .score-item{text-align:center;}
    .score-val{font-size:22px;font-weight:700;color:var(--accent);}
    .score-lbl{font-size:10px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;}
    .streak{color:var(--gold);}

    /* Guitar mode */
    .guitar-instruction{
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      padding:20px;max-width:480px;margin:0 auto;text-align:center;
    }
    .guitar-step{font-size:18px;font-weight:700;color:var(--accent);margin-bottom:10px;line-height:1.4;}
    .guitar-step .sub{font-size:13px;font-weight:400;color:var(--text-mid);display:block;margin-top:6px;}
    .guitar-hint{font-size:12px;color:var(--text-dim);margin-top:12px;line-height:1.5;}
    .guitar-fret-hint{
      background:var(--surface2);border-radius:8px;padding:10px 14px;margin-top:12px;
      font-size:12px;color:var(--text-mid);
    }
    .guitar-answer-row{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap;}
    .guitar-self{
      padding:10px 20px;border-radius:8px;border:2px solid #333;background:var(--surface2);
      color:#888;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;
    }
    .guitar-self.correct{border-color:var(--green);background:#0a1a0a;color:var(--green);}
    .guitar-self.wrong{border-color:var(--red);background:#1a0a0a;color:var(--red);}

    footer{text-align:center;margin-top:28px;font-size:10px;color:#333;letter-spacing:.08em;}
    footer a{color:var(--accent);text-decoration:none;opacity:.5;}
  </style>
</head>
<body>

<a href="index.html" class="back">← Hub</a>
<div class="header">
  <div class="header-label">Guitarra con Maru · Fase 5</div>
  <h1>Entrenador de Oído</h1>
</div>

<!-- Mode selector -->
<div class="mode-cards">
  <div class="mode-card active" data-mode="escucha">
    <div class="mode-card-icon">🎧</div>
    <div class="mode-card-title">Modo Escucha</div>
    <div class="mode-card-desc">Sin guitarra. En el bus, en la cola. La app toca, vos identificás.</div>
  </div>
  <div class="mode-card" data-mode="guitarra">
    <div class="mode-card-icon">🎸</div>
    <div class="mode-card-title">Modo Guitarra</div>
    <div class="mode-card-desc">Con instrumento. La app te da instrucciones, vos las ejecutás en la guitarra.</div>
  </div>
</div>

<!-- Level selector -->
<div class="level-row" id="level-row"></div>

<!-- Main content -->
<div id="main-content"></div>

<footer>El oído es la base de todo · <a href="index.html">← Hub</a></footer>

<script>
// ─── Audio ───────────────────────────────────────────────────────────
let audioCtx = null;
function getCtx(){ if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

const CHROMATIC=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function noteFreq(note,octave=4){
  const i=CHROMATIC.indexOf(note);
  return 261.63*Math.pow(2,(i+(octave-4)*12)/12);
}

function playNote(freq,duration=0.8,delay=0){
  const ctx=getCtx();
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.connect(gain);gain.connect(ctx.destination);
  osc.type='triangle';
  osc.frequency.value=freq;
  const t=ctx.currentTime+delay;
  gain.gain.setValueAtTime(0,t);
  gain.gain.linearRampToValueAtTime(0.25,t+0.02);
  gain.gain.exponentialRampToValueAtTime(0.001,t+duration);
  osc.start(t);osc.stop(t+duration+0.05);
}

function playInterval(note1,note2,harmonic=false){
  const f1=noteFreq(note1,3);
  const f2=noteFreq(note2,3);
  if(harmonic){
    playNote(f1,1.2);
    playNote(f2,1.2);
  } else {
    playNote(f1,0.6);
    playNote(f2,0.6,0.7);
  }
}

function playChord(notes,minor=false){
  const freqs=notes.map(n=>noteFreq(n,3));
  freqs.forEach((f,i)=>{
    const osc=getCtx().createOscillator();
    const gain=getCtx().createGain();
    osc.connect(gain);gain.connect(getCtx().destination);
    osc.type='triangle';osc.frequency.value=f;
    const t=getCtx().currentTime+i*0.03;
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(0.15,t+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001,t+1.5);
    osc.start(t);osc.stop(t+1.6);
  });
}

// ─── Levels ──────────────────────────────────────────────────────────
const LEVELS = [
  {
    id:'maj-min', name:'Mayor vs Menor',
    desc:'Identificá si un acorde es mayor o menor. El más importante para improvisar.',
    type:'chord_quality',
    items:[
      {label:'Mayor',play:()=>playChord(['C','E','G'])},
      {label:'Menor',play:()=>playChord(['C','D#','G'])},
    ]
  },
  {
    id:'intervals',name:'Intervalos básicos',
    desc:'Reconocé la distancia entre dos notas. Clave para escuchar melodías.',
    type:'interval',
    items:[
      {label:'2ª Mayor',play:()=>playInterval('C','D')},
      {label:'3ª Mayor',play:()=>playInterval('C','E')},
      {label:'5ª Justa',play:()=>playInterval('C','G')},
      {label:'8ª (Octava)',play:()=>playInterval('C','C')},
    ]
  },
  {
    id:'chord_types',name:'Tipos de acorde',
    desc:'Distinguí major, minor, sus2, sus4 y dom7.',
    type:'chord_quality',
    items:[
      {label:'Mayor',       play:()=>playChord(['C','E','G'])},
      {label:'Menor',       play:()=>playChord(['C','D#','G'])},
      {label:'Sus2',        play:()=>playChord(['C','D','G'])},
      {label:'Sus4',        play:()=>playChord(['C','F','G'])},
      {label:'Dominante 7', play:()=>playChord(['C','E','G','A#'])},
    ]
  },
  {
    id:'intervals_full',name:'Todos los intervalos',
    desc:'Los 12 intervalos del sistema cromático.',
    type:'interval',
    items:[
      {label:'Semitono (2ª m)',   play:()=>playInterval('C','C#')},
      {label:'Tono (2ª M)',       play:()=>playInterval('C','D')},
      {label:'3ª menor',          play:()=>playInterval('C','D#')},
      {label:'3ª Mayor',          play:()=>playInterval('C','E')},
      {label:'4ª Justa',          play:()=>playInterval('C','F')},
      {label:'4ª Aumentada',      play:()=>playInterval('C','F#')},
      {label:'5ª Justa',          play:()=>playInterval('C','G')},
      {label:'6ª Mayor',          play:()=>playInterval('C','A')},
      {label:'7ª menor',          play:()=>playInterval('C','A#')},
      {label:'7ª Mayor',          play:()=>playInterval('C','B')},
      {label:'Octava',            play:()=>playInterval('C','C')},
    ]
  },
];

// Guitar mode levels
const GUITAR_LEVELS = [
  {
    id:'find_note',name:'Encontrar notas',
    desc:'La app te dice una nota y la cuerda. Vos la encontrás en la guitarra.',
    type:'find_note'
  },
  {
    id:'interval_up',name:'Subir intervalos',
    desc:'Tocá una nota, luego subí el intervalo indicado en la misma cuerda.',
    type:'interval_up'
  },
  {
    id:'chord_play',name:'Tocar acordes',
    desc:'La app suena un acorde. Vos identificás y lo tocás.',
    type:'chord_play'
  },
];

// ─── State ────────────────────────────────────────────────────────────
const state = {
  mode: 'escucha',
  level: 'maj-min',
  currentItem: null,
  answered: false,
  score: 0,
  total: 0,
  streak: 0,
  bestStreak: 0,
};

// ─── Render levels ────────────────────────────────────────────────────
function renderLevels(){
  const row=document.getElementById('level-row');
  const levels=state.mode==='escucha'?LEVELS:GUITAR_LEVELS;
  const progress=JSON.parse(localStorage.getItem('maru_progress_oido')||'{}');
  row.innerHTML=levels.map(l=>{
    const done=(progress.levels||{})[l.id]>=10;
    const active=state.level===l.id;
    return `<button class="level-btn ${active?'active':''} ${done&&!active?'done':''}" data-level="${l.id}">${l.name}${done?'✓':''}</button>`;
  }).join('');
  row.querySelectorAll('.level-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.level=btn.dataset.level;
      state.score=0;state.total=0;state.streak=0;
      state.answered=false;
      renderLevels();
      renderMain();
    });
  });
}

// ─── Escucha Mode ─────────────────────────────────────────────────────
function newEscuchaQuestion(){
  const level=LEVELS.find(l=>l.id===state.level)||LEVELS[0];
  const correct=level.items[Math.floor(Math.random()*level.items.length)];
  state.currentItem=correct;
  state.answered=false;

  // Shuffle options
  const opts=[...level.items].sort(()=>Math.random()-.5);

  document.getElementById('main-content').innerHTML=`
    <div class="quiz-card">
      <div class="score-bar">
        <div class="score-item"><div class="score-val">${state.score}</div><div class="score-lbl">Correctas</div></div>
        <div class="score-item"><div class="score-val">${state.total}</div><div class="score-lbl">Total</div></div>
        <div class="score-item"><div class="score-val streak">${state.streak}</div><div class="score-lbl">Racha</div></div>
      </div>
      <div class="quiz-question">¿Qué tipo de <span class="highlight">${level.type==='interval'?'intervalo':'acorde'}</span> escuchás?</div>
      <button class="play-sound-btn" id="play-again">▶ Escuchar de nuevo</button>
      <div class="options" id="options">
        ${opts.map(o=>`<button class="opt-btn" data-label="${o.label}">${o.label}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
  `;

  // Play immediately
  correct.play();

  document.getElementById('play-again').addEventListener('click',()=>{ correct.play(); });

  document.querySelectorAll('.opt-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(state.answered)return;
      state.answered=true;
      state.total++;
      const isCorrect=btn.dataset.label===correct.label;
      if(isCorrect){state.score++;state.streak++;if(state.streak>state.bestStreak)state.bestStreak=state.streak;}
      else{state.streak=0;}

      document.querySelectorAll('.opt-btn').forEach(b=>{
        b.disabled=true;
        if(b.dataset.label===correct.label)b.classList.add('correct');
        else if(b===btn&&!isCorrect)b.classList.add('wrong');
      });

      const fb=document.getElementById('feedback');
      fb.className='feedback '+(isCorrect?'correct':'wrong');
      fb.textContent=isCorrect?'✓ ¡Correcto!':'✗ Era: '+correct.label;

      // Save progress
      saveProgress();

      const nextBtn=document.createElement('button');
      nextBtn.className='next-btn';nextBtn.textContent='Siguiente →';
      nextBtn.addEventListener('click',()=>newEscuchaQuestion());
      document.getElementById('feedback').after(nextBtn);
    });
  });
}

// ─── Guitar Mode ──────────────────────────────────────────────────────
function newGuitarQuestion(){
  const level=GUITAR_LEVELS.find(l=>l.id===state.level)||GUITAR_LEVELS[0];
  const strings=['E','A','D','G','B','e'];
  const string=strings[Math.floor(Math.random()*6)];
  const OPEN=['E','A','D','G','B','E'];
  const CHROMATIC_=CHROMATIC;
  const fret=Math.floor(Math.random()*13);
  const openIdx=CHROMATIC_.indexOf(OPEN[strings.indexOf(string)>=0?strings.indexOf(string):0]);
  const targetNote=CHROMATIC_[(openIdx+fret)%12];

  const intervals_=['2ª Mayor','3ª menor','3ª Mayor','4ª Justa','5ª Justa','6ª Mayor','7ª menor'];
  const intervalSemitones=[2,3,4,5,7,9,10];
  const iIdx=Math.floor(Math.random()*intervals_.length);
  const interval=intervals_[iIdx];
  const semitones=intervalSemitones[iIdx];
  const targetNote2=CHROMATIC_[(CHROMATIC_.indexOf(targetNote)+semitones)%12];

  let instruction='',hint='',type=level.type;

  if(type==='find_note'){
    instruction=`Encontrá la nota <strong>${targetNote}</strong> en la cuerda <strong>${string}</strong>`;
    hint=`Pista: está en el traste ${fret===0?'0 (al aire)':fret}`;
  } else if(type==='interval_up'){
    instruction=`Tocá <strong>${targetNote}</strong> en la cuerda <strong>${string}</strong>,<br>luego subí una <strong>${interval}</strong>`;
    hint=`La nota de llegada es <strong>${targetNote2}</strong>`;
  } else {
    // chord_play: play a chord, identify
    const isMinor=Math.random()>0.5;
    const chordNote=CHROMATIC_[Math.floor(Math.random()*12)];
    const chordName=chordNote+(isMinor?'m':'');
    instruction=`Escuchá el acorde y tocalo en la guitarra`;
    setTimeout(()=>{
      const root=noteFreq(chordNote,3);
      const third=isMinor?root*1.189:root*1.26;
      const fifth=root*1.5;
      [root,third,fifth].forEach((f,i)=>{
        playNote(f,1.2,i*0.03);
      });
    },300);
    hint=`Era: <strong>${chordName}</strong>`;
  }

  state.answered=false;

  document.getElementById('main-content').innerHTML=`
    <div class="score-bar" style="justify-content:center;display:flex;gap:16px;margin-bottom:16px;">
      <div class="score-item"><div class="score-val">${state.score}</div><div class="score-lbl">Correctas</div></div>
      <div class="score-item"><div class="score-val">${state.total}</div><div class="score-lbl">Total</div></div>
      <div class="score-item"><div class="score-val streak">${state.streak}</div><div class="score-lbl">Racha</div></div>
    </div>
    <div class="guitar-instruction">
      <div class="guitar-step">${instruction}</div>
      <div class="guitar-hint">Tomá tu tiempo. Encontrá la nota, tocala, y evaluá vos mismo si salió bien.</div>
      <div class="guitar-fret-hint" id="guitar-hint" style="display:none;">${hint}</div>
      <div class="guitar-answer-row">
        <button class="guitar-self" data-ans="show">👁 Ver pista</button>
        <button class="guitar-self" data-ans="correct">✓ Lo hice bien</button>
        <button class="guitar-self" data-ans="wrong">✗ No lo logré</button>
      </div>
    </div>
  `;

  document.querySelectorAll('.guitar-self').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(btn.dataset.ans==='show'){
        document.getElementById('guitar-hint').style.display='';
        return;
      }
      if(state.answered)return;
      state.answered=true;
      state.total++;
      const ok=btn.dataset.ans==='correct';
      if(ok){state.score++;state.streak++;}else{state.streak=0;}
      btn.classList.add(ok?'correct':'wrong');
      document.getElementById('guitar-hint').style.display='';
      saveProgress();

      // Next button
      const next=document.createElement('button');
      next.className='next-btn';next.style.marginTop='12px';
      next.textContent='Siguiente →';
      next.addEventListener('click',()=>newGuitarQuestion());
      document.querySelector('.guitar-instruction').appendChild(next);
    });
  });
}

// ─── Main render ─────────────────────────────────────────────────────
function renderMain(){
  if(state.mode==='escucha') newEscuchaQuestion();
  else newGuitarQuestion();
}

// ─── Progress ────────────────────────────────────────────────────────
function saveProgress(){
  const data=JSON.parse(localStorage.getItem('maru_progress_oido')||'{}');
  data.visited=true;
  data.pct=Math.min(100,((data.pct||0)+2));
  if(!data.levels)data.levels={};
  data.levels[state.level]=(data.levels[state.level]||0)+1;
  localStorage.setItem('maru_progress_oido',JSON.stringify(data));
  renderLevels();
}

// ─── Init ─────────────────────────────────────────────────────────────
document.querySelectorAll('.mode-card').forEach(card=>{
  card.addEventListener('click',()=>{
    state.mode=card.dataset.mode;
    state.score=0;state.total=0;state.streak=0;
    document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('active'));
    card.classList.add('active');
    // Default level for mode
    state.level=state.mode==='escucha'?'maj-min':'find_note';
    renderLevels();
    renderMain();
  });
});

// Init progress marker
const p=JSON.parse(localStorage.getItem('maru_progress_oido')||'{}');
p.visited=true;p.pct=p.pct||5;
localStorage.setItem('maru_progress_oido',JSON.stringify(p));

renderLevels();
renderMain();
</script>
</body>
</html>
