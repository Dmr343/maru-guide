<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tests — Backing Track</title>
  <style>
    body{background:#0e0e0e;color:#e8d5b0;font-family:'Trebuchet MS',sans-serif;padding:24px;max-width:720px;margin:0 auto;}
    h1{font-size:18px;font-weight:300;color:#d4a847;margin-bottom:6px;}
    .notice{font-size:11px;color:#555;margin-bottom:24px;padding:10px 14px;border:1px solid #222;border-radius:6px;line-height:1.6;}
    code{background:#1a1a1a;padding:1px 5px;border-radius:3px;color:#888;}
    .summary{padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px;font-weight:700;}
    .summary.pass{background:#0a1a0a;border:1px solid #2ecc71;color:#2ecc71;}
    .summary.fail{background:#1a0a0a;border:1px solid #e74c3c;color:#e74c3c;}
    .suite{margin-bottom:6px;border:1px solid #222;border-radius:6px;overflow:hidden;}
    .suite summary{padding:8px 12px;cursor:pointer;font-weight:700;background:#141414;list-style:none;}
    .suite-pass summary{color:#2ecc71;}
    .suite-fail summary{color:#e74c3c;}
    .test{padding:3px 12px 3px 26px;font-size:12px;}
    .test.pass{color:#2ecc71;}
    .test.fail{color:#e74c3c;}
    .test pre{font-size:11px;color:#888;margin:2px 0 6px;white-space:pre-wrap;border-left:2px solid #333;padding-left:8px;}
    a{color:#3498db;font-size:11px;}
  </style>
</head>
<body>
  <h1>Tests — Backing Track</h1>
  <div class="notice">
    Funciona con <code>file://</code> y con HTTP indistintamente — los módulos
    usan IIFE + namespace global, no ES modules.
  </div>
  <div id="test-results">Cargando tests...</div>

  <!-- Dependencias compartidas (orden importa: theory → test-runner) -->
  <script src="../shared/theory.js"></script>
  <script src="../shared/test-runner.js"></script>

  <!-- Módulos del backing track + sus tests -->
  <script src="./voicing.js"></script>
  <script src="./voicing.test.js"></script>
  <script src="./step-grid.js"></script>
  <script src="./step-grid.test.js"></script>
  <script src="./scheduler.js"></script>
  <script src="./scheduler.test.js"></script>

  <script>
    window.GuitarShared.testRunner.run('test-results');
  </script>
</body>
</html>
