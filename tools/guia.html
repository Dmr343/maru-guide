<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guía de Aprendizaje — Guitarra con Maru</title>
  <style>
    :root{
      --bg:#0e0e0e;--surface:#141414;--surface2:#1a1a1a;--border:#222;
      --text:#e8d5b0;--text-dim:#555;--text-mid:#888;
      --accent:#e67e22;--accent-dim:#1a0e00;
      --gold:#d4a847;--green:#2ecc71;--red:#e74c3c;
      --radius:10px;--font:'Trebuchet MS','Segoe UI',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{zoom:1.4;}
    body{background:var(--bg);color:var(--text);font-family:var(--font);padding:16px 12px 60px;min-height:100vh;}
    .back{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--text-dim);font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;transition:color .15s;}
    .back:hover{color:var(--accent);}
    .header{text-align:center;margin-bottom:8px;}
    .header-label{font-size:10px;letter-spacing:.3em;color:var(--text-dim);text-transform:uppercase;margin-bottom:4px;}
    .header h1{font-size:clamp(16px,4vw,24px);font-weight:300;color:var(--accent);letter-spacing:.08em;margin-bottom:4px;}
    .header-sub{font-size:12px;color:var(--text-dim);margin-bottom:16px;}

    /* Global progress */
    .global-progress{max-width:640px;margin:0 auto 24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;}
    .gp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .gp-label{font-size:11px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;}
    .gp-pct{font-size:13px;font-weight:700;color:var(--accent);}
    .progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:2px;transition:width .5s;}
    .phase-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
    .phase-pill{
      padding:4px 12px;border-radius:12px;font-size:10px;font-weight:700;letter-spacing:.05em;
      border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);cursor:default;
    }
    .phase-pill.current{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
    .phase-pill.done{border-color:var(--green);color:var(--green);background:#0a1a0a;}

    /* Print button */
    .top-actions{display:flex;gap:8px;justify-content:flex-end;max-width:640px;margin:0 auto 16px;}
    .print-btn{padding:6px 14px;border-radius:6px;border:1px solid #333;background:#1a1a1a;color:#666;font-size:11px;cursor:pointer;transition:all .15s;}
    .print-btn:hover{color:#bbb;border-color:#555;}

    /* Phase cards */
    .phases{max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:12px;}

    .phase-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s;}
    .phase-card.current-phase{border-color:var(--accent);}
    .phase-card.done-phase{border-color:var(--green);}

    .phase-header{
      display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;
      transition:background .15s;user-select:none;
    }
    .phase-header:hover{background:var(--surface2);}
    .phase-icon{font-size:20px;flex-shrink:0;}
    .phase-title-wrap{flex:1;}
    .phase-number{font-size:10px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:2px;}
    .phase-title{font-size:15px;font-weight:700;}
    .phase-tagline{font-size:11px;font-style:italic;margin-top:2px;}
    .phase-chevron{font-size:16px;color:var(--text-dim);transition:transform .2s;flex-shrink:0;}
    .phase-card.open .phase-chevron{transform:rotate(180deg);}

    /* Phase badges */
    .phase-badge{
      padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700;flex-shrink:0;
    }
    .badge-current{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent);}
    .badge-done{background:#0a1a0a;color:var(--green);border:1px solid var(--green);}
    .badge-locked{background:#1a1a1a;color:#444;border:1px solid #2a2a2a;}

    /* Phase body */
    .phase-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border);}
    .phase-card.open .phase-body{display:block;}

    /* Session format */
    .session-box{background:var(--surface2);border-radius:8px;padding:12px 14px;margin:12px 0;}
    .session-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;}
    .session-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:6px;font-size:12px;}
    .session-time{color:var(--accent);font-weight:700;min-width:52px;flex-shrink:0;}
    .session-desc{color:var(--text-mid);line-height:1.5;}

    /* Content sections */
    .content-section{margin:12px 0;}
    .content-title{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;}
    .content-title .expand-icon{font-size:10px;transition:transform .15s;}
    .content-title.expanded .expand-icon{transform:rotate(180deg);}
    .content-body{font-size:12px;color:var(--text-mid);line-height:1.7;display:none;}
    .content-body.visible{display:block;}
    .content-body p{margin-bottom:6px;}
    .content-body strong{color:var(--text);}
    .content-body code{background:var(--surface2);padding:1px 4px;border-radius:3px;font-family:monospace;font-size:11px;color:var(--gold);}

    /* Materials */
    .materials{margin:12px 0;}
    .material-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #1a1a1a;font-size:12px;}
    .material-item:last-child{border-bottom:none;}
    .material-type{font-size:14px;flex-shrink:0;}
    .material-link{color:var(--accent);text-decoration:none;transition:opacity .15s;}
    .material-link:hover{opacity:.7;}
    .material-label{color:var(--text-mid);}

    /* Checklist */
    .checklist{margin:12px 0;}
    .check-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid #1a1a1a;cursor:pointer;}
    .check-item:last-child{border-bottom:none;}
    .check-item:hover{opacity:.85;}
    .check-box{
      width:18px;height:18px;border-radius:4px;border:2px solid #333;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;
    }
    .check-box.checked{background:var(--green);border-color:var(--green);}
    .check-box.checked::after{content:'✓';font-size:11px;color:#fff;font-weight:700;}
    .check-text{font-size:12px;color:var(--text-mid);line-height:1.5;}
    .check-item.checked-item .check-text{color:var(--text-dim);text-decoration:line-through;}

    /* Apps row */
    .apps-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
    .app-link{
      padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);
      color:var(--text-mid);font-size:11px;font-weight:700;text-decoration:none;transition:all .15s;display:flex;align-items:center;gap:5px;
    }
    .app-link:hover{color:var(--text);border-color:#444;}

    /* Mark phase done */
    .phase-actions{display:flex;justify-content:flex-end;margin-top:14px;}
    .mark-done-btn{padding:8px 18px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#666;font-size:12px;cursor:pointer;transition:all .15s;}
    .mark-done-btn:hover{border-color:var(--green);color:var(--green);}
    .mark-done-btn.done{border-color:var(--green);color:var(--green);background:#0a1a0a;}

    /* ─── Print Styles ─── */
    @media print {
      body{background:#fff;color:#111;padding:10px;}
      .back,.top-actions,.phase-header .phase-chevron,
      .apps-row,.mark-done-btn,.phase-actions,.global-progress .phase-pills{display:none!important;}
      .phase-body{display:block!important;}
      .phase-card{border:1px solid #ccc;margin-bottom:14px;page-break-inside:avoid;border-radius:4px;}
      .phase-header{background:#f5f5f5;}
      .phase-title{color:#333;font-size:14px;}
      .phase-tagline{color:#666;}
      .session-box{background:#fafafa;border:1px solid #e0e0e0;}
      .session-time{color:#e67e22;}
      .content-body{display:block!important;}
      .content-title{color:#999;}
      .material-link{color:#e67e22;}
      .check-box{border-color:#ccc;}
      .check-text{color:#444;}
      .header h1{color:#e67e22;}
      .header-sub{color:#999;}
      .global-progress{border:1px solid #ccc;}
      .gp-label{color:#999;}
      .gp-pct{color:#e67e22;}
    }
    footer{text-align:center;margin-top:28px;font-size:10px;color:#333;letter-spacing:.08em;}
    footer a{color:var(--accent);text-decoration:none;opacity:.5;}
  </style>
</head>

// ─── State ────────────────────────────────────────────────────────────
function loadState(){
  try{ return JSON.parse(localStorage.getItem('maru_progress_guia')||'{}'); }catch{return{};}
}
function saveState(data){
  localStorage.setItem('maru_progress_guia',JSON.stringify(data));
}

let guiaData = loadState();
if(!guiaData.checks) guiaData.checks={};
if(!guiaData.completedPhases) guiaData.completedPhases=[];
if(guiaData.currentPhase===undefined) guiaData.currentPhase=0;
if(!guiaData.openPhases) guiaData.openPhases=[];

function calcPct(){
  let total=0,done=0;
  PHASES.forEach(p=>{
    total+=p.checklist.length;
    p.checklist.forEach((_,i)=>{if((guiaData.checks[p.id]||{})[i])done++;});
  });
  return total?Math.round(done/total*100):0;
}

// ─── Build UI ────────────────────────────────────────────────────────
function buildUI(){
  buildPhases();
  buildGlobalProgress();
}

function buildGlobalProgress(){
  const pct=calcPct();
  document.getElementById('gp-pct').textContent=pct+'%';
  document.getElementById('gp-bar').style.width=pct+'%';

  const pills=document.getElementById('phase-pills');
  pills.innerHTML=PHASES.map(p=>{
    const done=guiaData.completedPhases.includes(p.id);
    const current=!done&&guiaData.currentPhase===PHASES.indexOf(p);
    return `<span class="phase-pill ${done?'done':current?'current':''}">${p.number}${done?' ✓':''}</span>`;
  }).join('');

  // Update hub progress
  const hubData={pct,currentPhase:guiaData.currentPhase,completedPhases:guiaData.completedPhases.map(id=>PHASES.findIndex(p=>p.id===id))};
  localStorage.setItem('maru_progress_guia',JSON.stringify({...guiaData,...hubData}));
}

function buildPhases(){
  const container=document.getElementById('phases');
  container.innerHTML='';

  PHASES.forEach((phase,phaseIdx)=>{
    const isDone=guiaData.completedPhases.includes(phase.id);
    const isCurrent=!isDone&&guiaData.currentPhase===phaseIdx;
    const isOpen=guiaData.openPhases.includes(phase.id)||(isCurrent&&guiaData.openPhases.length===0&&phaseIdx===0);

    const card=document.createElement('div');
    card.className=`phase-card ${isDone?'done-phase':isCurrent?'current-phase':''} ${isOpen?'open':''}`;

    // Badge
    let badge='';
    if(isDone) badge='<span class="phase-badge badge-done">✓ Completada</span>';
    else if(isCurrent) badge='<span class="phase-badge badge-current">● En curso</span>';

    // Session rows
    const sessionRows=phase.session.map(s=>
      `<div class="session-row"><span class="session-time">${s.time}</span><span class="session-desc">${s.desc}</span></div>`
    ).join('');

    // Content sections
    const contentSections=phase.content.map((c,ci)=>`
      <div class="content-section">
        <div class="content-title" data-phase="${phase.id}" data-ci="${ci}">
          <span class="expand-icon">▼</span>${c.title}
        </div>
        <div class="content-body" id="cb-${phase.id}-${ci}">${c.text}</div>
      </div>
    `).join('');

    // Materials
    const materialItems=phase.materials.map(m=>
      `<div class="material-item">
        <span class="material-type">${m.type}</span>
        ${m.url
          ?`<a href="${m.url}" target="_blank" class="material-link">${m.label}</a>`
          :`<span class="material-label">${m.label}</span>`}
      </div>`
    ).join('');

    // Checklist
    const checkItems=phase.checklist.map((c,i)=>{
      const checked=!!(guiaData.checks[phase.id]||{})[i];
      return `<div class="check-item ${checked?'checked-item':''}" data-phase="${phase.id}" data-ci="${i}">
        <div class="check-box ${checked?'checked':''}"></div>
        <div class="check-text">${c}</div>
      </div>`;
    }).join('');

    // Apps
    const appLinks=phase.apps.map(a=>
      `<a href="${a.url}" class="app-link">${a.icon} ${a.label}</a>`
    ).join('');

    card.innerHTML=`
      <div class="phase-header">
        <div class="phase-icon">${phase.icon}</div>
        <div class="phase-title-wrap">
          <div class="phase-number" style="color:${phase.color}">${phase.number} · ${phase.sessions}</div>
          <div class="phase-title" style="color:${phase.color}">${phase.title}</div>
          <div class="phase-tagline" style="color:${phase.color}88">${phase.tagline}</div>
        </div>
        ${badge}
        <span class="phase-chevron">▼</span>
      </div>
      <div class="phase-body">
        <div class="session-box">
          <div class="session-label">Estructura de sesión</div>
          ${sessionRows}
        </div>
        ${contentSections}
        <div class="content-section">
          <div class="content-title" data-phase="${phase.id}" data-ci="mat">
            <span class="expand-icon">▼</span>Materiales de Maru
          </div>
          <div class="content-body" id="cb-${phase.id}-mat">${materialItems}</div>
        </div>
        <div class="checklist">
          <div class="content-title expanded" style="cursor:default;"><span></span>Señal de salida — ¿Estás listo para avanzar?</div>
          ${checkItems}
        </div>
        ${appLinks?`<div style="margin-top:4px;"><div class="session-label">Apps para esta fase</div><div class="apps-row">${appLinks}</div></div>`:''}
        <div class="phase-actions">
          <button class="mark-done-btn ${isDone?'done':''}" data-phase="${phase.id}">
            ${isDone?'✓ Completada':'Marcar como completada'}
          </button>
        </div>
      </div>
    `;

    container.appendChild(card);

    // Toggle header
    card.querySelector('.phase-header').addEventListener('click',()=>{
      const open=card.classList.contains('open');
      if(open){
        card.classList.remove('open');
        guiaData.openPhases=guiaData.openPhases.filter(id=>id!==phase.id);
      } else {
        card.classList.add('open');
        if(!guiaData.openPhases.includes(phase.id))guiaData.openPhases.push(phase.id);
      }
      saveState(guiaData);
    });

    // Content expand
    card.querySelectorAll('.content-title[data-ci]').forEach(title=>{
      title.addEventListener('click',()=>{
        const ci=title.dataset.ci;
        const body=document.getElementById(`cb-${phase.id}-${ci}`);
        if(!body)return;
        const vis=body.classList.contains('visible');
        body.classList.toggle('visible',!vis);
        title.classList.toggle('expanded',!vis);
      });
    });

    // Checklist
    card.querySelectorAll('.check-item[data-phase]').forEach(item=>{
      item.addEventListener('click',()=>{
        const pid=item.dataset.phase;
        const ci=parseInt(item.dataset.ci);
        if(!guiaData.checks[pid])guiaData.checks[pid]={};
        guiaData.checks[pid][ci]=!guiaData.checks[pid][ci];
        saveState(guiaData);
        buildUI();
      });
    });

    // Mark done
    card.querySelector('.mark-done-btn').addEventListener('click',()=>{
      const pid=phase.id;
      if(guiaData.completedPhases.includes(pid)){
        guiaData.completedPhases=guiaData.completedPhases.filter(id=>id!==pid);
      } else {
        guiaData.completedPhases.push(pid);
        // Advance current phase
        guiaData.currentPhase=Math.min(PHASES.length-1,phaseIdx+1);
      }
      saveState(guiaData);
      buildUI();
    });
  });
}

// ─── Init ─────────────────────────────────────────────────────────────
// Open current phase by default
if(guiaData.openPhases.length===0){
  guiaData.openPhases=[PHASES[guiaData.currentPhase||0].id];
}
buildUI();
</script>
