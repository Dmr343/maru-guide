<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escalas — Entrenador</title>
  <style>
    :root {
      --bg:#0e0e0e;--surface:#141414;--surface2:#1a1a1a;--border:#222;
      --text:#e8d5b0;--text-dim:#555;--text-mid:#888;
      --accent:#2ecc71;--accent-dim:#0a2a10;
      --gold:#d4a847;--radius:10px;--font:'Trebuchet MS','Segoe UI',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{zoom:1.4;}
    body{background:var(--bg);color:var(--text);font-family:var(--font);padding:16px 12px 40px;min-height:100vh;}
    .back{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--text-dim);font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;transition:color .15s;}
    .back:hover{color:var(--accent);}
    .header{text-align:center;margin-bottom:20px;}
    .header-label{font-size:10px;letter-spacing:.3em;color:var(--text-dim);text-transform:uppercase;margin-bottom:4px;}
    .header h1{font-size:clamp(16px,4vw,24px);font-weight:300;color:var(--accent);letter-spacing:.08em;}

    /* Mode tabs */
    .tabs{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}
    .tab{padding:8px 18px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.05em;}
    .tab.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px rgba(46,204,113,.15);}

    /* Scale selector */
    .scale-section{max-width:720px;margin:0 auto 16px;}
    .section-label{font-size:10px;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;}
    .scale-grid{display:flex;flex-wrap:wrap;gap:6px;}
    .scale-btn{
      padding:8px 14px;border-radius:8px;border:2px solid #2a2a2a;background:#1a1a1a;
      color:#666;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;text-align:left;
    }
    .scale-btn:hover{border-color:#444;color:#aaa;}
    .scale-btn.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent);}
    .scale-btn .scale-sub{font-size:10px;font-weight:400;opacity:.7;display:block;margin-top:2px;}

    /* Position nav */
    .pos-nav{display:flex;gap:6px;align-items:center;justify-content:center;margin:0 auto 14px;flex-wrap:wrap;}
    .pos-btn{padding:6px 12px;border-radius:6px;border:1px solid #333;background:#1a1a1a;color:#555;font-size:11px;cursor:pointer;transition:all .15s;}
    .pos-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
    .pos-label{font-size:11px;color:var(--text-dim);}

    /* Legend */
    .legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-mid);}
    .legend-dot{width:12px;height:12px;border-radius:50%;}

    /* Fretboard */
    .fretboard-wrap{overflow-x:auto;padding-bottom:8px;}
    .fretboard-inner{min-width:640px;max-width:900px;margin:0 auto;}
    svg#fretboard{width:100%;display:block;}

    /* Quiz panel */
    .quiz-panel{max-width:480px;margin:16px auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
    .quiz-question{text-align:center;font-size:14px;color:var(--text);margin-bottom:16px;line-height:1.5;}
    .quiz-question strong{color:var(--accent);}
    .quiz-options{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
    .quiz-opt{padding:10px 20px;border-radius:8px;border:2px solid #333;background:#1a1a1a;color:#888;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
    .quiz-opt:hover{border-color:#666;color:#ccc;}
    .quiz-opt.correct{border-color:var(--accent);background:var(--accent-dim);color:var(--accent);}
    .quiz-opt.wrong{border-color:#e74c3c;background:#1a0a0a;color:#e74c3c;}
    .quiz-feedback{text-align:center;margin-top:14px;font-size:13px;min-height:20px;}
    .quiz-next{margin-top:12px;display:block;width:100%;padding:10px;border-radius:8px;border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
    .quiz-next:hover{background:var(--accent);color:#000;}
    .quiz-score{text-align:center;font-size:11px;color:var(--text-dim);margin-top:10px;letter-spacing:.1em;}

    /* Scale description */
    .scale-info{max-width:480px;margin:12px auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;}
    .scale-info-name{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:6px;}
    .scale-info-desc{font-size:12px;color:var(--text-mid);line-height:1.6;}
    .scale-info-notes{margin-top:8px;font-size:11px;color:var(--text-dim);letter-spacing:.08em;}

    /* Calc mode */
    .calc-panel{max-width:720px;margin:0 auto 14px;}
    .calc-type-row{display:flex;gap:8px;justify-content:center;margin-bottom:12px;}
    .calc-type-btn{padding:8px 16px;border-radius:20px;border:2px solid #333;background:#1a1a1a;color:#555;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
    .calc-type-btn.major.active{border-color:#d4a847;background:#d4a84722;color:#d4a847;}
    .calc-type-btn.pmajor.active{border-color:#e67e22;background:#e67e2222;color:#e67e22;}
    .calc-type-btn.minor.active{border-color:#8e44ad;background:#8e44ad22;color:#c39bd3;}
    .calc-type-btn.pminor.active{border-color:#e91e8c;background:#e91e8c22;color:#e91e8c;}
    .calc-penta-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;background:#222;color:#888;margin-left:6px;letter-spacing:.05em;}
    .diag-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 2px;}
    .diag-label{font-size:12px;color:#777;letter-spacing:.05em;}
    .ios-toggle{position:relative;display:inline-block;width:46px;height:26px;flex-shrink:0;}
    .ios-toggle input{opacity:0;width:0;height:0;position:absolute;}
    .ios-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#333;border-radius:26px;transition:.3s;}
    .ios-slider:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background:#666;border-radius:50%;transition:.3s;}
    .ios-toggle input:checked + .ios-slider{background:#00c9b1;}
    .ios-toggle input:checked + .ios-slider:before{transform:translateX(20px);background:#fff;}
    .ios-toggle input:disabled + .ios-slider{opacity:.35;cursor:default;}
    .calc-formula-box{background:var(--surface);border:1px solid #2a2a2a;border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;}
    .calc-formula-label{font-size:10px;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;}
    .calc-formula-steps{display:flex;align-items:center;flex-wrap:wrap;gap:0;font-size:13px;font-family:monospace;}
    .calc-step-note{padding:4px 8px;border-radius:6px;font-weight:800;font-size:13px;background:#111;border:1px solid #333;}
    .calc-step-note.root-note{border-color:var(--calc-color,#d4a847);color:var(--calc-color,#d4a847);box-shadow:0 0 8px var(--calc-color,#d4a847)44;}
    .calc-step-sep{padding:2px 5px;color:#444;font-size:11px;font-weight:700;}
    .calc-step-sep.T{color:#666;}
    .calc-step-sep.S{color:#e74c3c88;}
    .calc-hint{text-align:center;padding:10px;font-size:12px;color:var(--text-dim);background:#111;border-radius:8px;border:1px dashed #2a2a2a;}
    .calc-result-notes{margin-top:8px;font-size:11px;color:var(--text-dim);letter-spacing:.06em;text-align:center;}
    .calc-mode-active #fretboard{cursor:crosshair;}

    /* Editor mode */
    .editor-panel{max-width:720px;margin:0 auto 14px;background:var(--surface);border:1px solid #2a2a2a;border-radius:var(--radius);padding:14px 16px;}
    .editor-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px;}
    .editor-label{font-size:10px;letter-spacing:.15em;color:var(--text-dim);text-transform:uppercase;min-width:70px;}
    .editor-select{background:#1a1a1a;border:1px solid #333;color:var(--text);border-radius:6px;padding:6px 10px;font-size:12px;cursor:pointer;}
    .deg-btn{width:32px;height:32px;border-radius:6px;border:2px solid #333;background:#1a1a1a;color:#555;font-size:13px;font-weight:800;cursor:pointer;transition:all .15s;}
    .deg-btn.active{background:var(--edit-color,var(--accent))22;border-color:var(--edit-color,var(--accent));color:var(--edit-color,var(--accent));}
    .editor-hint{font-size:11px;color:var(--text-dim);padding:8px 12px;background:#111;border-radius:6px;border-left:3px solid #333;}
    .editor-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
    .btn-save{padding:8px 18px;border-radius:8px;border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;}
    .btn-save:hover{background:var(--accent);color:#000;}
    .btn-clear{padding:8px 18px;border-radius:8px;border:1px solid #555;background:#1a1a1a;color:#777;font-size:12px;font-weight:700;cursor:pointer;}
    .btn-clear:hover{border-color:#e74c3c;color:#e74c3c;}
    .btn-reset{padding:8px 18px;border-radius:8px;border:1px solid #333;background:#111;color:#444;font-size:11px;cursor:pointer;}
    .btn-reset:hover{color:#888;border-color:#555;}
    .edit-mode-active #fretboard{cursor:crosshair;}
    .editor-saved{color:var(--accent);font-size:11px;margin-left:8px;opacity:0;transition:opacity .3s;}
    .editor-saved.show{opacity:1;}

    /* Modes section */
    .calc-modes-section{margin-top:10px;}
    .calc-modes-header{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
    .calc-modes-label{font-size:10px;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;}
    .mode-view-toggle{display:flex;gap:4px;margin-left:auto;}
    .mode-view-btn{padding:4px 10px;border-radius:6px;border:1px solid #333;background:#1a1a1a;color:#555;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;font-family:var(--font);letter-spacing:.03em;}
    .mode-view-btn:hover{border-color:#555;color:#888;}
    .mode-view-btn.active{border-color:var(--text-dim);color:var(--text);}
    .calc-modes-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
    .calc-mode-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 10px;border-radius:8px;border:2px solid #2a2a2a;background:#1a1a1a;cursor:pointer;transition:all .15s;min-width:64px;text-align:center;font-family:var(--font);}
    .calc-mode-btn:hover{border-color:#444;}
    .calc-mode-btn.active{border-color:var(--mode-color);box-shadow:0 0 10px var(--mode-color)44;}
    .mode-degree{font-size:10px;color:#444;}
    .calc-mode-btn.active .mode-degree{color:var(--mode-color);}
    .mode-note{font-size:17px;font-weight:800;color:#555;}
    .calc-mode-btn.active .mode-note{color:var(--mode-color);}
    .mode-name{font-size:10px;font-weight:700;color:#444;}
    .calc-mode-btn.active .mode-name{color:var(--mode-color);}
    .mode-sound{font-size:9px;color:#333;margin-top:1px;}
    .calc-mode-btn.active .mode-sound{color:#777;}

    /* Metronome */
    .metro-bar{display:flex;align-items:center;gap:10px;justify-content:center;margin:12px auto 0;max-width:360px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
    .metro-btn{padding:6px 14px;border-radius:6px;border:1px solid #333;background:#1a1a1a;color:#555;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;}
    .metro-btn:hover{color:#bbb;border-color:#555;}
    .metro-btn.metro-on{border-color:#2ecc71;color:#2ecc71;background:#0a2a10;}
    .metro-bpm-row{display:flex;align-items:center;gap:6px;}
    .metro-bpm-btn{padding:4px 9px;border-radius:6px;border:1px solid #2a2a2a;background:#141414;color:#666;font-size:12px;cursor:pointer;transition:all .15s;}
    .metro-bpm-btn:hover{color:#aaa;}
    .metro-bpm-val{font-size:16px;font-weight:700;color:var(--gold);min-width:36px;text-align:center;}
    .metro-beat-dot{width:10px;height:10px;border-radius:50%;background:#222;transition:background .05s,box-shadow .05s;}
    .metro-beat-dot.on{background:#2ecc71;box-shadow:0 0 8px #2ecc71;}

    footer{text-align:center;margin-top:28px;font-size:10px;color:#333;letter-spacing:.08em;}
    footer a{color:var(--accent);text-decoration:none;opacity:.5;}
  </style>
</head>
<body>

<a href="index.html" class="back">← Hub</a>

<div class="header">
  <div class="header-label">Guitarra con Maru · Fases 1 y 4</div>
  <h1>Escalas</h1>
</div>

<div class="tabs">
  <button class="tab active" data-mode="calc">🎸 Calcular</button>
  <button class="tab" data-mode="quiz">🎯 Quiz</button>
  <button class="tab" data-mode="edit">✏️ Editor</button>
</div>

<div class="scale-section">
  <div class="section-label">Seleccioná una escala</div>
  <div class="scale-grid" id="scale-grid"></div>
</div>

<div class="pos-nav" id="pos-nav" style="display:none;"></div>
<div class="legend" id="legend" style="display:none;"></div>

<div class="fretboard-wrap">
  <div class="fretboard-inner">
    <svg id="fretboard" viewBox="0 0 920 220" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<div class="metro-bar" id="metro-bar">
  <button class="metro-btn" id="metro-play">▶ Metro</button>
  <div class="metro-bpm-row">
    <button class="metro-bpm-btn" id="metro-down">−5</button>
    <div class="metro-bpm-val" id="metro-bpm-val">80</div>
    <button class="metro-bpm-btn" id="metro-up">+5</button>
    <span style="font-size:10px;color:var(--text-dim);letter-spacing:.1em;">BPM</span>
  </div>
  <div class="metro-beat-dot" id="metro-beat-dot"></div>
</div>

<div class="scale-info" id="scale-info" style="display:none;"></div>
<div class="quiz-panel" id="quiz-panel" style="display:none;"></div>
<div class="editor-panel" id="editor-panel" style="display:none;"></div>
<div class="calc-panel" id="calc-panel" style="display:none;"></div>

<footer>Afinación estándar · E A D G B e · Trastes 0–12 · <a href="index.html">← Hub</a></footer>

<script>
// ─── Data ────────────────────────────────────────────────────────────
const CHROMATIC = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const OPEN_NOTES = ['E','A','D','G','B','E'];
const STRING_LABELS = ['E','A','D','G','B','e'];
const FRET_MARKERS = [3,5,7,9,12];
const STRING_THICK = [3.2,2.6,2.0,1.5,1.0,0.6];

function noteAt(open,fret){ return CHROMATIC[(CHROMATIC.indexOf(open)+fret)%12]; }

// Scale patterns: each position is array of {si, fret, degree}
// degree: 1=root, 2=2nd, 3=3rd, 4=4th, 5=5th, 6=6th, 7=7th
let SCALES = {
  'ionian_G': {
    name: 'Sol Mayor — Jónica',
    sub: 'La que ya conocés · Pos. 1',
    desc: 'La escala mayor. El punto de partida de todo. 7 notas, patrón W-W-H-W-W-W-H. Usala para improvisar sobre backing tracks en Sol Mayor.',
    root: 'G', color: '#3498db',
    notes: ['G','A','B','C','D','E','F#'],
    fase: 'Fase 0',
    positions: [[
      {si:5,fret:3,d:1},{si:5,fret:5,d:2},
      {si:4,fret:2,d:3},{si:4,fret:3,d:4},{si:4,fret:5,d:5},
      {si:3,fret:2,d:6},{si:3,fret:4,d:7},{si:3,fret:5,d:1},
      {si:2,fret:2,d:2},{si:2,fret:4,d:3},{si:2,fret:5,d:4},
      {si:1,fret:3,d:5},{si:1,fret:5,d:6},
      {si:0,fret:3,d:1},{si:0,fret:5,d:2}
    ]]
  },
  'penta_minor_A': {
    name: 'La Menor Pentatónica',
    sub: 'Posición 1 · Traste 5',
    desc: 'La escala del rock, blues y todo lo que suena "intuitivo". Solo 5 notas, 2 por cuerda. Casi cualquier combinación sobre un backing track en Am suena bien.',
    root: 'A', color: '#e74c3c',
    notes: ['A','C','D','E','G'],
    fase: 'Fase 1',
    positions: [
      [ // Pos 1
        {si:5,fret:5,d:1},{si:5,fret:8,d:4},
        {si:4,fret:5,d:5},{si:4,fret:7,d:7},
        {si:3,fret:5,d:1},{si:3,fret:7,d:2},
        {si:2,fret:5,d:3},{si:2,fret:7,d:4},
        {si:1,fret:5,d:5},{si:1,fret:8,d:7},
        {si:0,fret:5,d:1},{si:0,fret:8,d:4}
      ],
      [ // Pos 2
        {si:5,fret:7,d:4},{si:5,fret:10,d:5},
        {si:4,fret:7,d:7},{si:4,fret:10,d:1},
        {si:3,fret:7,d:2},{si:3,fret:9,d:3},
        {si:2,fret:7,d:4},{si:2,fret:10,d:5},
        {si:1,fret:8,d:7},{si:1,fret:10,d:1},
        {si:0,fret:7,d:4},{si:0,fret:10,d:5}
      ]
    ]
  },
  'penta_major_G_ladder': {
    name: 'Sol Mayor Pentatónica',
    sub: 'Escalera diagonal · Maru',
    desc: 'La escalera pentatónica de Maru. Tocás las mismas notas que la posición vertical pero en diagonal, usando slides. Conecta todo el mástil. Usá dedos 1 y 3.',
    root: 'G', color: '#2ecc71',
    notes: ['G','A','B','D','E'],
    fase: 'Fase 1',
    positions: [[
      {si:5,fret:3,d:1,slide:true},{si:5,fret:5,d:2},
      {si:4,fret:5,d:3,slide:true},{si:4,fret:7,d:5},
      {si:3,fret:7,d:6,slide:true},{si:3,fret:9,d:1},
      {si:2,fret:8,d:2,slide:true},{si:2,fret:10,d:3},
      {si:1,fret:10,d:5,slide:true},{si:1,fret:12,d:6},
      {si:0,fret:10,d:1},{si:0,fret:12,d:2}
    ]]
  },
  'penta_minor_G': {
    name: 'Sol Menor Pentatónica',
    sub: 'Posición 1 · Traste 3',
    desc: 'La pentatónica menor en Sol. Usala para improvisar sobre backing tracks en Gm. Mismo patrón que Am, desplazado 2 trastes.',
    root: 'G', color: '#e67e22',
    notes: ['G','Bb','C','D','F'],
    fase: 'Fase 1',
    positions: [[
      {si:5,fret:3,d:1},{si:5,fret:6,d:4},
      {si:4,fret:3,d:5},{si:4,fret:5,d:7},
      {si:3,fret:3,d:1},{si:3,fret:5,d:2},
      {si:2,fret:3,d:3},{si:2,fret:5,d:4},
      {si:1,fret:3,d:5},{si:1,fret:6,d:7},
      {si:0,fret:3,d:1},{si:0,fret:6,d:4}
    ]]
  }
};

// ─── State ────────────────────────────────────────────────────────────
const state = {
  mode: 'calc',          // calc | quiz | edit
  selectedScale: null,
  positionIdx: 0,
  quizScore: 0,
  quizTotal: 0,
  quizAnswer: null,
  quizCorrectNote: null,
  // editor
  editScaleId: null,
  editDots: [],          // [{si, fret, d}]
  editDegree: 1,
  // calc
  calcType: 'major',     // 'major' | 'pmajor' | 'minor' | 'pminor'
  calcRoot: null,        // {si, fret, note}
  calcDiagonal: false,   // toggle diagonal run view
  calcModeIdx: 0,        // 0-6: active mode index (0 = Jónico, only used when calcType==='major')
  calcModeFromRoot: false, // true = modo aplicado a la raíz original (G Mixolidio); false = modo dentro de la clave (D Mixolidio)
  calcPositions: [],       // positions from last calc render, used by quiz
  // metronome
  metroPlaying: false,
  metroBpm: 80,
};

// ─── Scale formulas ──────────────────────────────────────────────────
const FORMULAS = {
  major:  { steps: [2,2,1,2,2,2,1], label: 'Mayor Natural',     color: '#d4a847', isPenta: false },
  pmajor: { steps: [2,2,3,2,3],     label: 'Pentatónica Mayor', color: '#e67e22', isPenta: true, removedDegrees: '4° y 7°' },
  minor:  { steps: [2,1,2,2,1,2,2], label: 'Menor Natural',     color: '#8e44ad', isPenta: false },
  pminor: { steps: [3,2,2,3,2],     label: 'Pentatónica Menor', color: '#e91e8c', isPenta: true, removedDegrees: '2° y 6°' },
};

const MODES = [
  { name: 'Jónico',    degreeOffset: 0, sound: 'Mayor puro',    color: '#d4a847', steps: [2,2,1,2,2,2,1] },
  { name: 'Dórico',    degreeOffset: 1, sound: 'Menor · funky', color: '#3498db', steps: [2,1,2,2,2,1,2] },
  { name: 'Frigio',    degreeOffset: 2, sound: 'Menor · exótico',color:'#e74c3c', steps: [1,2,2,2,1,2,2] },
  { name: 'Lidio',     degreeOffset: 3, sound: 'Mayor · soñador',color:'#2ecc71', steps: [2,2,2,1,2,2,1] },
  { name: 'Mixolidio', degreeOffset: 4, sound: 'Mayor · bluesy',color: '#e67e22', steps: [2,2,1,2,2,1,2] },
  { name: 'Eólico',    degreeOffset: 5, sound: 'Menor natural', color: '#9b59b6', steps: [2,1,2,2,1,2,2] },
  { name: 'Locrio',    degreeOffset: 6, sound: 'Disminuido',    color: '#e91e8c', steps: [1,2,2,1,2,2,2] },
];

function buildScaleNotes(rootNote, formula){
  const idx = CHROMATIC.indexOf(rootNote);
  const notes = [rootNote];
  let cur = idx;
  formula.steps.forEach(step=>{ cur=(cur+step)%12; notes.push(CHROMATIC[cur]); });
  return notes.slice(0, formula.steps.length);
}

function allPositionsOfNotes(scaleNotes){
  const positions=[];
  for(let si=0;si<6;si++){
    for(let fret=0;fret<=12;fret++){
      const note=noteAt(OPEN_NOTES[si],fret);
      const di=scaleNotes.indexOf(note);
      if(di>=0) positions.push({si,fret,d:di+1});
    }
  }
  return positions;
}

// ─── Custom scale overrides (localStorage) ───────────────────────────
function loadCustomScales(){
  try{
    const raw=localStorage.getItem('maru_escalas_custom');
    if(!raw) return;
    const overrides=JSON.parse(raw);
    Object.entries(overrides).forEach(([id,data])=>{
      if(SCALES[id]) SCALES[id].positions=data.positions;
    });
  }catch(e){}
}

function saveCustomScales(){
  try{
    const raw=localStorage.getItem('maru_escalas_custom');
    const overrides=raw?JSON.parse(raw):{};
    overrides[state.editScaleId]={positions:SCALES[state.editScaleId].positions.slice()};
    localStorage.setItem('maru_escalas_custom',JSON.stringify(overrides));
  }catch(e){}
}

function resetCustomScale(id){
  try{
    const raw=localStorage.getItem('maru_escalas_custom');
    if(!raw) return;
    const overrides=JSON.parse(raw);
    delete overrides[id];
    localStorage.setItem('maru_escalas_custom',JSON.stringify(overrides));
  }catch(e){}
}

// ─── SVG Fretboard ────────────────────────────────────────────────────
const SVG_W=920,SVG_H=220,NUT_X=48,RIGHT_X=SVG_W-16;
const FRET_W=(RIGHT_X-NUT_X)/12;
const STRING_TOP=28,STRING_BOT=SVG_H-28;
const STRING_GAP=(STRING_BOT-STRING_TOP)/5;

function fretX(fret){ return fret===0?NUT_X-4:NUT_X+(fret-0.5)*FRET_W; }
function stringY(si){ return STRING_BOT-si*STRING_GAP; }

function initFretboard(){
  const svg=document.getElementById('fretboard'); svg.innerHTML='';
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML='<filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  svg.appendChild(defs);
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  // Nut
  const nut=document.createElementNS('http://www.w3.org/2000/svg','rect');
  nut.setAttribute('x',NUT_X-5);nut.setAttribute('y',STRING_TOP-8);
  nut.setAttribute('width',5);nut.setAttribute('height',STRING_GAP*5+16);
  nut.setAttribute('fill','#5a4820');g.appendChild(nut);
  // Frets
  for(let f=1;f<=12;f++){
    const x=NUT_X+f*FRET_W;
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x);l.setAttribute('y1',STRING_TOP-6);l.setAttribute('x2',x);l.setAttribute('y2',STRING_BOT+6);
    l.setAttribute('stroke','#1a1a1a');l.setAttribute('stroke-width','2');g.appendChild(l);
  }
  // Fret numbers
  for(let f=0;f<=12;f++){
    const x=f===0?NUT_X-18:NUT_X+(f-0.5)*FRET_W;
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',x);t.setAttribute('y',14);t.setAttribute('text-anchor','middle');t.setAttribute('font-size','10');
    t.setAttribute('fill',FRET_MARKERS.includes(f)?'#d4a847':'#2a2a2a');t.setAttribute('font-family','Trebuchet MS,sans-serif');
    t.textContent=f===0?'○':f;g.appendChild(t);
  }
  // Strings
  OPEN_NOTES.forEach((_,si)=>{
    const y=stringY(si);
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',NUT_X-4);l.setAttribute('y1',y);l.setAttribute('x2',RIGHT_X);l.setAttribute('y2',y);
    l.setAttribute('stroke','#3a2a10');l.setAttribute('stroke-width',STRING_THICK[si]);g.appendChild(l);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',22);t.setAttribute('y',y+4);t.setAttribute('text-anchor','middle');t.setAttribute('font-size','11');
    t.setAttribute('font-style','italic');t.setAttribute('font-weight','700');t.setAttribute('fill','#444');t.setAttribute('font-family','Trebuchet MS,sans-serif');
    t.textContent=STRING_LABELS[si];g.appendChild(t);
  });
  // Position markers
  FRET_MARKERS.forEach(f=>{
    if(f===12){
      [1,3].forEach(si=>{const c=makeDot(NUT_X+(f-0.5)*FRET_W,stringY(si)-STRING_GAP*.5,4,'#1e1e1e');g.appendChild(c);});
    }else{
      g.appendChild(makeDot(NUT_X+(f-0.5)*FRET_W,stringY(2)-STRING_GAP*.5,4,'#1e1e1e'));
    }
  });
  svg.appendChild(g);
  const dotsG=document.createElementNS('http://www.w3.org/2000/svg','g');
  dotsG.id='fb-dots';svg.appendChild(dotsG);
}

function makeDot(cx,cy,r,fill){
  const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);c.setAttribute('fill',fill);return c;
}

function DEGREE_COLORS(scale){
  return {
    1: scale.color,        // root — full color
    2: scale.color+'99',
    3: scale.color+'99',
    4: scale.color+'99',
    5: scale.color+'99',
    6: scale.color+'99',
    7: scale.color+'99',
  };
}

function renderDots(){
  const dotsG=document.getElementById('fb-dots'); dotsG.innerHTML='';
  if(!state.selectedScale) return;
  const scale=SCALES[state.selectedScale];
  const positions=scale.positions;
  const pos=positions[state.positionIdx]||positions[0];
  const dc=DEGREE_COLORS(scale);

  // For connect mode — show both positions with different opacity
  if(state.mode==='connect' && positions.length>1){
    const otherIdx=(state.positionIdx+1)%positions.length;
    const other=positions[otherIdx];
    other.forEach(p=>{
      const cx=fretX(p.fret),cy=stringY(p.si);
      const c=makeDot(cx,cy,11,scale.color+'33');
      dotsG.appendChild(c);
      // Dashed circle
      const ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
      ring.setAttribute('cx',cx);ring.setAttribute('cy',cy);ring.setAttribute('r',13);
      ring.setAttribute('fill','none');ring.setAttribute('stroke',scale.color+'55');ring.setAttribute('stroke-width','1.5');
      ring.setAttribute('stroke-dasharray','3,3');dotsG.appendChild(ring);
    });
  }

  pos.forEach(p=>{
    const cx=fretX(p.fret),cy=stringY(p.si);
    const isRoot=p.d===1;
    const col=dc[p.d];
    const r=isRoot?14:11;
    const c=makeDot(cx,cy,r,col);
    if(isRoot) c.setAttribute('filter','url(#glow)');
    dotsG.appendChild(c);
    // Label
    const noteName=noteAt(OPEN_NOTES[p.si],p.fret);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',cx);t.setAttribute('y',cy+4);t.setAttribute('text-anchor','middle');t.setAttribute('font-size','9');
    t.setAttribute('font-weight','800');t.setAttribute('fill',isRoot?'#fff':'#000');t.setAttribute('font-family','Trebuchet MS,sans-serif');
    t.textContent=noteName;dotsG.appendChild(t);

    // Slide indicator
    if(p.slide){
      const sl=document.createElementNS('http://www.w3.org/2000/svg','text');
      sl.setAttribute('x',cx+16);sl.setAttribute('y',cy-10);sl.setAttribute('font-size','9');
      sl.setAttribute('fill',scale.color+'99');sl.setAttribute('font-family','Trebuchet MS,sans-serif');
      sl.textContent='slide↗';dotsG.appendChild(sl);
    }
  });
}

// ─── Quiz ─────────────────────────────────────────────────────────────
function generateQuiz(){
  // Determine which positions to quiz from: hardcoded scale OR calc positions
  let pos = null;
  if(state.selectedScale && SCALES[state.selectedScale]){
    pos = SCALES[state.selectedScale].positions[0];
  } else if(state.calcRoot && state.calcPositions && state.calcPositions.length){
    pos = state.calcPositions;
  }
  if(!pos){
    document.getElementById('quiz-panel').innerHTML='<p style="text-align:center;color:var(--text-dim);font-size:12px;">Seleccioná una escala o calculá una para hacer el quiz</p>';
    document.getElementById('quiz-panel').style.display='block';
    return;
  }
  // Pick a random note from the scale
  const item=pos[Math.floor(Math.random()*pos.length)];
  const correctNote=noteAt(OPEN_NOTES[item.si],item.fret);
  const strLabel=STRING_LABELS[item.si];
  state.quizAnswer=null;
  state.quizCorrectNote=correctNote;

  // Wrong answers from chromatic
  const options=new Set([correctNote]);
  while(options.size<4){
    options.add(CHROMATIC[Math.floor(Math.random()*12)]);
  }
  const shuffled=[...options].sort(()=>Math.random()-.5);

  const panel=document.getElementById('quiz-panel');
  panel.style.display='block';
  panel.innerHTML=`
    <div class="quiz-question">
      ¿Qué nota es el traste <strong>${item.fret===0?'0 (al aire)':item.fret}</strong> de la cuerda <strong>${strLabel}</strong>?
    </div>
    <div class="quiz-options">
      ${shuffled.map(n=>`<button class="quiz-opt" data-note="${n}">${n}</button>`).join('')}
    </div>
    <div class="quiz-feedback" id="quiz-feedback"></div>
    <div class="quiz-score">Puntaje: ${state.quizScore} / ${state.quizTotal}</div>
  `;
  panel.querySelectorAll('.quiz-opt').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(state.quizAnswer!==null)return;
      state.quizAnswer=btn.dataset.note;
      state.quizTotal++;
      const correct=btn.dataset.note===correctNote;
      if(correct)state.quizScore++;
      btn.classList.add(correct?'correct':'wrong');
      if(!correct){
        panel.querySelector(`[data-note="${correctNote}"]`)?.classList.add('correct');
      }
      document.getElementById('quiz-feedback').innerHTML=
        correct?'<span style="color:var(--accent)">✓ Correcto!</span>':'<span style="color:#e74c3c">✗ Era '+correctNote+'</span>';
      document.getElementById('quiz-feedback').insertAdjacentHTML('afterend',
        `<button class="quiz-next" id="quiz-next-btn">Siguiente pregunta →</button>`);
      document.getElementById('quiz-next-btn')?.addEventListener('click',generateQuiz);
    });
  });
}

// ─── Calc mode ───────────────────────────────────────────────────────
function stepLabel(s){ return s===1?'S': s===2?'T':'m3'; }

function buildDiagonalPath(scaleNotes){
  const BASE = [0,5,10,15,19,24]; // semitones from low E: E A D G B e
  const allPos = allPositionsOfNotes(scaleNotes)
    .filter(p => p.fret >= 1)
    .map(p => ({...p, pitch: BASE[p.si] + p.fret}));

  if(!allPos.length) return [];

  const n = scaleNotes.length;
  const perString = new Map();
  const used = new Set();
  const key = p => `${p.si},${p.fret}`;

  // Nodo inicial: menor fret < 5 en la cuerda más grave posible
  const early = allPos.filter(p => p.fret < 5).sort((a,b) => a.si-b.si || a.fret-b.fret);
  const start = early[0] || allPos.sort((a,b) => a.pitch-b.pitch)[0];

  const path = [{...start, pathSlide: false}];
  used.add(key(start));
  perString.set(start.si, 1);
  let lastPitch = start.pitch;
  let lastSi    = start.si;
  let lastFret  = start.fret;
  let deg = start.d;

  for(let step = 0; step < n * 6; step++){
    deg = (deg % n) + 1; // siguiente grado consecutivo, sin saltarse ninguno

    const valid = p => p.d===deg && p.pitch>lastPitch && !used.has(key(p)) && (perString.get(p.si)||0)<3;

    // Candidatos en la misma cuerda y en la cuerda siguiente
    const sameCand = allPos.filter(p => p.si===lastSi   && valid(p))
                           .sort((a,b) => Math.abs(a.fret-lastFret) - Math.abs(b.fret-lastFret));
    const nextCand = allPos.filter(p => p.si===lastSi+1 && valid(p))
                           .sort((a,b) => Math.abs(a.fret-lastFret) - Math.abs(b.fret-lastFret));

    let chosen;
    if(sameCand.length && nextCand.length){
      const dSame = Math.abs(sameCand[0].fret - lastFret);
      const dNext = Math.abs(nextCand[0].fret - lastFret);
      // Preferir misma cuerda si empatan o es más cercana; subir cuerda solo si es estrictamente más cerca
      chosen = dNext < dSame ? nextCand[0] : sameCand[0];
    } else if(sameCand.length){
      chosen = sameCand[0];
    } else if(nextCand.length){
      chosen = nextCand[0];
    } else {
      // Fallback: cualquier candidato de pitch más bajo
      const any = allPos.filter(valid).sort((a,b) => a.pitch-b.pitch);
      if(!any.length) break;
      chosen = any[0];
    }

    path.push({...chosen, pathSlide: chosen.si !== lastSi});
    used.add(key(chosen));
    perString.set(chosen.si, (perString.get(chosen.si)||0)+1);
    lastPitch = chosen.pitch;
    lastSi    = chosen.si;
    lastFret  = chosen.fret;
  }
  return path;
}

function renderCalcPanel(){
  const panel=document.getElementById('calc-panel');
  if(state.mode!=='calc'){panel.style.display='none';document.querySelector('.fretboard-inner').classList.remove('calc-mode-active');return;}
  panel.style.display='block';
  document.querySelector('.fretboard-inner').classList.add('calc-mode-active');

  const formula=FORMULAS[state.calcType];

  // Mode support: only for major scale
  const activeMode=(state.calcType==='major')?MODES[state.calcModeIdx]:null;
  const displayColor=activeMode?activeMode.color:formula.color;
  const displaySteps=activeMode?activeMode.steps:formula.steps;

  let majorScaleNotes=null, displayNotes=null, formulaHTML='';
  if(state.calcRoot){
    majorScaleNotes=buildScaleNotes(state.calcRoot.note, formula);
    if(activeMode&&state.calcModeIdx>0){
      displayNotes=state.calcModeFromRoot
        ?buildScaleNotes(state.calcRoot.note,activeMode)
        :[...majorScaleNotes.slice(state.calcModeIdx),...majorScaleNotes.slice(0,state.calcModeIdx)];
    } else {
      displayNotes=majorScaleNotes;
    }
    const notesRow=[...displayNotes, displayNotes[0]];
    formulaHTML=notesRow.map((n,i)=>{
      const noteEl=`<span class="calc-step-note${i===0?' root-note':''}" style="--calc-color:${displayColor}">${n}</span>`;
      if(i<displaySteps.length){
        const lbl=stepLabel(displaySteps[i]);
        return noteEl+`<span class="calc-step-sep" style="color:${displayColor}88;font-size:10px;padding:0 4px;">${lbl}</span>`;
      }
      return noteEl;
    }).join('');
  } else {
    formulaHTML=formula.steps.map(s=>{
      const lbl=stepLabel(s);
      return `<span class="calc-step-sep" style="font-size:13px;padding:4px 8px;background:#111;border-radius:4px;border:1px solid #222;color:${formula.color}99;">${lbl}</span>`;
    }).join('<span style="color:#333;padding:0 2px;">—</span>');
  }

  const formulaLabel=(activeMode&&state.calcModeIdx>0)
    ?(displayNotes?`${displayNotes[0]} ${activeMode.name}`:activeMode.name)+` · ${activeMode.sound}`
    :formula.label;

  const pentaNote=formula.isPenta
    ? `<div style="font-size:11px;color:#666;margin-top:6px;">Escala natural sin el ${formula.removedDegrees} · ${formula.steps.length} notas</div>`
    : '';

  const diagBtn=formula.isPenta?`
      <label class="ios-toggle" style="margin-left:auto;" title="Diagonal">
        <input type="checkbox" id="calc-diagonal-toggle" ${state.calcDiagonal?'checked':''} ${!state.calcRoot?'disabled':''}>
        <span class="ios-slider"></span>
      </label>`:'';

  const modeViewToggle=(state.calcModeIdx>0&&majorScaleNotes)?`
    <div class="mode-view-toggle">
      <button class="mode-view-btn${!state.calcModeFromRoot?' active':''}" data-from-root="0">Dentro de la clave</button>
      <button class="mode-view-btn${state.calcModeFromRoot?' active':''}" data-from-root="1">${activeMode?activeMode.name:''} desde ${state.calcRoot.note}</button>
    </div>
  `:'';

  const modesSection=(state.calcType==='major'&&majorScaleNotes)?`
    <div class="calc-modes-section">
      <div class="calc-modes-header">
        <div class="calc-modes-label">Modos de ${state.calcRoot.note} Mayor</div>
        ${modeViewToggle}
      </div>
      <div class="calc-modes-row">
        ${MODES.map((m,i)=>{
          const modeRoot=majorScaleNotes[m.degreeOffset];
          const isActive=state.calcModeIdx===i;
          return `<button class="calc-mode-btn${isActive?' active':''}" data-mode-idx="${i}" style="--mode-color:${m.color}">
            <span class="mode-degree">${m.degreeOffset+1}°</span>
            <span class="mode-note">${modeRoot}</span>
            <span class="mode-name">${m.name}</span>
            <span class="mode-sound">${m.sound}</span>
          </button>`;
        }).join('')}
      </div>
    </div>
  `:'';

  panel.innerHTML=`
    <div class="calc-type-row" style="flex-wrap:wrap;align-items:center;">
      <button class="calc-type-btn major${state.calcType==='major'?' active':''}" data-type="major">Mayor</button>
      <button class="calc-type-btn pmajor${state.calcType==='pmajor'?' active':''}" data-type="pmajor">Pentatónica Mayor</button>
      <button class="calc-type-btn minor${state.calcType==='minor'?' active':''}" data-type="minor">Menor</button>
      <button class="calc-type-btn pminor${state.calcType==='pminor'?' active':''}" data-type="pminor">Pentatónica Menor</button>
      ${diagBtn}
    </div>
    <div class="calc-formula-box">
      <div class="calc-formula-label" style="color:${displayColor}99;">${formulaLabel}</div>
      <div class="calc-formula-steps" id="calc-formula-steps">${formulaHTML}</div>
      ${displayNotes?`<div class="calc-result-notes">Notas: ${displayNotes.join(' · ')}</div>`:''}
      ${pentaNote}
    </div>
    ${modesSection}
    ${!state.calcRoot?'<div class="calc-hint">Hacé click en cualquier nota del diapasón para calcular desde esa raíz</div>':''}
  `;

  panel.querySelectorAll('.calc-type-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.calcType=btn.dataset.type;
      state.calcModeIdx=0;
      state.calcModeFromRoot=false;
      renderCalcPanel();
      renderCalcDots();
    });
  });
  panel.querySelectorAll('.calc-mode-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.calcModeIdx=parseInt(btn.dataset.modeIdx);
      renderCalcPanel();
      renderCalcDots();
    });
  });
  panel.querySelectorAll('.mode-view-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.calcModeFromRoot=btn.dataset.fromRoot==='1';
      renderCalcPanel();
      renderCalcDots();
    });
  });
  document.getElementById('calc-diagonal-toggle')?.addEventListener('change',e=>{
    state.calcDiagonal=e.target.checked;
    renderCalcPanel();
    renderCalcDots();
  });
}

function renderCalcDots(){
  const dotsG=document.getElementById('fb-dots'); dotsG.innerHTML='';
  if(state.mode!=='calc'||!state.calcRoot) return;
  const formula=FORMULAS[state.calcType];
  const scaleNotes=buildScaleNotes(state.calcRoot.note, formula);
  // Mode support: rotate notes so mode root becomes degree 1
  let displayNotes=scaleNotes;
  let color=formula.color;
  if(state.calcType==='major'&&state.calcModeIdx>0){
    const mode=MODES[state.calcModeIdx];
    displayNotes=state.calcModeFromRoot
      ?buildScaleNotes(state.calcRoot.note,mode)
      :[...scaleNotes.slice(state.calcModeIdx),...scaleNotes.slice(0,state.calcModeIdx)];
    color=mode.color;
  }
  const positions=allPositionsOfNotes(displayNotes);
  state.calcPositions = positions; // store for quiz use

  if(state.calcDiagonal){
    // ── Diagonal mode ──────────────────────────────────────────────
    const path=buildDiagonalPath(displayNotes);

    // 1. Draw background dots (dimmed)
    positions.forEach(p=>{
      const cx=fretX(p.fret),cy=stringY(p.si);
      const c=makeDot(cx,cy,10,color+'22');
      dotsG.appendChild(c);
    });

    // 2. Draw connecting dashed lines
    for(let i=1;i<path.length;i++){
      const a=path[i-1],b=path[i];
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',fretX(a.fret));line.setAttribute('y1',stringY(a.si));
      line.setAttribute('x2',fretX(b.fret));line.setAttribute('y2',stringY(b.si));
      line.setAttribute('stroke',color+'88');line.setAttribute('stroke-width','1.5');
      line.setAttribute('stroke-dasharray','5,3');
      dotsG.appendChild(line);
    }

    // 3. Draw path dots with sequence numbers
    path.forEach((p,i)=>{
      const cx=fretX(p.fret),cy=stringY(p.si);
      const isRoot=p.d===1;
      const r=isRoot?15:12;
      const fill=isRoot?color:color+'cc';
      const c=makeDot(cx,cy,r,fill);
      if(isRoot) c.setAttribute('filter','url(#glow)');
      dotsG.appendChild(c);
      // Note name
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',cx);t.setAttribute('y',cy+4);t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size','8');t.setAttribute('font-weight','800');
      t.setAttribute('fill','#000');t.setAttribute('font-family','Trebuchet MS,sans-serif');
      t.textContent=noteAt(OPEN_NOTES[p.si],p.fret);dotsG.appendChild(t);
      // Sequence badge (top-right)
      const seq=document.createElementNS('http://www.w3.org/2000/svg','text');
      seq.setAttribute('x',cx+(isRoot?14:11));seq.setAttribute('y',cy-(isRoot?12:9));
      seq.setAttribute('font-size','9');seq.setAttribute('fill',color);
      seq.setAttribute('font-weight','800');seq.setAttribute('font-family','Trebuchet MS,sans-serif');
      seq.textContent=p.d;dotsG.appendChild(seq);
      // Slide indicator
      if(p.pathSlide){
        const sl=document.createElementNS('http://www.w3.org/2000/svg','text');
        sl.setAttribute('x',cx);sl.setAttribute('y',cy-18);
        sl.setAttribute('text-anchor','middle');sl.setAttribute('font-size','10');
        sl.setAttribute('fill','#00c9b1');sl.setAttribute('font-family','Trebuchet MS,sans-serif');
        sl.textContent='↗';dotsG.appendChild(sl);
      }
    });

  } else {
    // ── Normal mode ─────────────────────────────────────────────────
    positions.forEach(p=>{
      const cx=fretX(p.fret), cy=stringY(p.si);
      const isRoot=p.d===1;
      const r=isRoot?15:11;
      const fill=isRoot?color:color+'88';
      const c=makeDot(cx,cy,r,fill);
      if(isRoot) c.setAttribute('filter','url(#glow)');
      dotsG.appendChild(c);
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',cx);t.setAttribute('y',cy+4);t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size','8');t.setAttribute('font-weight','800');
      t.setAttribute('fill','#000');t.setAttribute('font-family','Trebuchet MS,sans-serif');
      t.textContent=noteAt(OPEN_NOTES[p.si],p.fret);dotsG.appendChild(t);
      const deg=document.createElementNS('http://www.w3.org/2000/svg','text');
      deg.setAttribute('x',cx+(isRoot?13:10));deg.setAttribute('y',cy-(isRoot?12:9));
      deg.setAttribute('font-size','8');deg.setAttribute('fill',color);
      deg.setAttribute('font-weight','800');deg.setAttribute('font-family','Trebuchet MS,sans-serif');
      deg.textContent=p.d;dotsG.appendChild(deg);
    });
  }
}

function handleCalcClick(svgX,svgY){
  let best=null,bestDist=Infinity;
  for(let si=0;si<6;si++){
    for(let fret=0;fret<=12;fret++){
      const cx=fretX(fret),cy=stringY(si);
      const d=Math.hypot(svgX-cx,svgY-cy);
      if(d<bestDist){bestDist=d;best={si,fret};}
    }
  }
  if(bestDist>28) return;
  const {si,fret}=best;
  const note=noteAt(OPEN_NOTES[si],fret);
  state.calcRoot={si,fret,note};
  renderCalcPanel();
  renderCalcDots();
}

// ─── Editor ──────────────────────────────────────────────────────────
function enterEditMode(scaleId){
  state.editScaleId=scaleId||Object.keys(SCALES)[0];
  const scale=SCALES[state.editScaleId];
  state.editDots=JSON.parse(JSON.stringify(scale.positions[0]||[]));
  state.editDegree=1;
  document.querySelector('.fretboard-inner').classList.add('edit-mode-active');
}

function renderEditorPanel(){
  const panel=document.getElementById('editor-panel');
  if(state.mode!=='edit'){panel.style.display='none';document.querySelector('.fretboard-inner').classList.remove('edit-mode-active');return;}
  panel.style.display='block';
  document.querySelector('.fretboard-inner').classList.add('edit-mode-active');
  if(!state.editScaleId) enterEditMode(null);
  const scale=SCALES[state.editScaleId];

  panel.innerHTML=`
    <div class="editor-row">
      <span class="editor-label">Escala</span>
      <select class="editor-select" id="edit-scale-sel">
        ${Object.entries(SCALES).map(([id,s])=>`<option value="${id}"${id===state.editScaleId?' selected':''}>${s.name}</option>`).join('')}
      </select>
    </div>
    <div class="editor-row">
      <span class="editor-label">Grado</span>
      ${[1,2,3,4,5,6,7].map(d=>`<button class="deg-btn${state.editDegree===d?' active':''}" data-deg="${d}" style="--edit-color:${scale.color}">${d}</button>`).join('')}
    </div>
    <div class="editor-hint">Hacé <strong>click</strong> en el diapasón para agregar notas. Click en un punto existente para borrarlo.</div>
    <div class="editor-actions">
      <button class="btn-save" id="btn-save-scale">Guardar cambios</button>
      <button class="btn-clear" id="btn-clear-pos">Limpiar todo</button>
      <button class="btn-reset" id="btn-reset-scale">Restablecer default</button>
      <span class="editor-saved" id="editor-saved">✓ Guardado</span>
    </div>
  `;

  panel.querySelector('#edit-scale-sel').addEventListener('change',e=>{
    enterEditMode(e.target.value);
    renderEditorPanel();
    renderEditorDots();
  });
  panel.querySelectorAll('.deg-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.editDegree=parseInt(btn.dataset.deg);
      renderEditorPanel();
    });
  });
  panel.querySelector('#btn-save-scale').addEventListener('click',()=>{
    // Commit editDots as position[0] of the selected scale
    SCALES[state.editScaleId].positions[0]=JSON.parse(JSON.stringify(state.editDots));
    saveCustomScales();
    const saved=document.getElementById('editor-saved');
    saved.classList.add('show');
    setTimeout(()=>saved.classList.remove('show'),2000);
  });
  panel.querySelector('#btn-clear-pos').addEventListener('click',()=>{
    state.editDots=[];
    renderEditorDots();
  });
  panel.querySelector('#btn-reset-scale').addEventListener('click',()=>{
    resetCustomScale(state.editScaleId);
    // Reload page to restore default data
    location.reload();
  });
}

function renderEditorDots(){
  const dotsG=document.getElementById('fb-dots'); dotsG.innerHTML='';
  if(state.mode!=='edit') return;
  const scale=SCALES[state.editScaleId]||Object.values(SCALES)[0];
  state.editDots.forEach(p=>{
    const cx=fretX(p.fret),cy=stringY(p.si);
    const isRoot=p.d===1;
    const col=isRoot?scale.color:scale.color+'88';
    const c=makeDot(cx,cy,isRoot?14:11,col);
    if(isRoot) c.setAttribute('filter','url(#glow)');
    dotsG.appendChild(c);
    const noteName=noteAt(OPEN_NOTES[p.si],p.fret);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',cx);t.setAttribute('y',cy+4);t.setAttribute('text-anchor','middle');
    t.setAttribute('font-size','9');t.setAttribute('font-weight','800');
    t.setAttribute('fill',isRoot?'#fff':'#000');t.setAttribute('font-family','Trebuchet MS,sans-serif');
    t.textContent=noteName;dotsG.appendChild(t);
    // Degree badge
    const deg=document.createElementNS('http://www.w3.org/2000/svg','text');
    deg.setAttribute('x',cx+(isRoot?12:10));deg.setAttribute('y',cy-(isRoot?12:10));
    deg.setAttribute('font-size','8');deg.setAttribute('fill',scale.color);
    deg.setAttribute('font-weight','700');deg.setAttribute('font-family','Trebuchet MS,sans-serif');
    deg.textContent=p.d;dotsG.appendChild(deg);
  });
}

// SVG click handler (edit mode)
function handleFretClick(svgX,svgY){
  let best=null,bestDist=Infinity;
  for(let si=0;si<6;si++){
    for(let fret=0;fret<=12;fret++){
      const cx=fretX(fret),cy=stringY(si);
      const d=Math.hypot(svgX-cx,svgY-cy);
      if(d<bestDist){bestDist=d;best={si,fret};}
    }
  }
  if(bestDist>28) return;
  const {si,fret}=best;
  const idx=state.editDots.findIndex(p=>p.si===si&&p.fret===fret);
  if(idx>=0){ state.editDots.splice(idx,1); }
  else{ state.editDots.push({si,fret,d:state.editDegree}); }
  renderEditorDots();
}

// ─── Render ─────────────────────────────────────────────────────────
function render(){
  const hideAll=()=>{
    document.getElementById('legend').style.display='none';
    document.getElementById('pos-nav').style.display='none';
    document.getElementById('scale-info').style.display='none';
    document.getElementById('quiz-panel').style.display='none';
    document.getElementById('editor-panel').style.display='none';
    document.getElementById('calc-panel').style.display='none';
    document.getElementById('scale-grid').closest('.scale-section').style.display='none';
    document.querySelector('.fretboard-inner').classList.remove('edit-mode-active','calc-mode-active');
  };
  if(state.mode==='edit'){
    hideAll();
    renderEditorPanel();
    renderEditorDots();
    return;
  }
  if(state.mode==='calc'){
    hideAll();
    renderCalcPanel();
    renderCalcDots();
    return;
  }
  document.getElementById('scale-grid').closest('.scale-section').style.display='';
  document.getElementById('editor-panel').style.display='none';
  document.getElementById('calc-panel').style.display='none';
  document.querySelector('.fretboard-inner').classList.remove('edit-mode-active','calc-mode-active');
  renderDots();
  renderLegend();
  renderPosNav();
  renderScaleInfo();
  if(state.mode==='quiz') generateQuiz();
  else document.getElementById('quiz-panel').style.display='none';
}

// ─── Scale Buttons ───────────────────────────────────────────────────
function buildScaleButtons(){
  const grid=document.getElementById('scale-grid');
  grid.innerHTML='';
  Object.entries(SCALES).forEach(([id,scale])=>{
    const btn=document.createElement('button');
    btn.className='scale-btn'+(state.selectedScale===id?' active':'');
    btn.innerHTML=`${scale.name}<span class="scale-sub">${scale.sub}</span>`;
    btn.style.setProperty('--accent',scale.color);
    btn.addEventListener('click',()=>{
      state.selectedScale=state.selectedScale===id?null:id;
      state.positionIdx=0;
      state.quizScore=0;state.quizTotal=0;
      buildScaleButtons();
      render();
    });
    grid.appendChild(btn);
  });
  // Active button styles
  grid.querySelectorAll('.scale-btn').forEach(btn=>{
    const id=Object.keys(SCALES).find(k=>SCALES[k].name===btn.querySelector('.scale-sub')?.previousSibling?.textContent);
  });
  // Re-apply active styles
  Object.entries(SCALES).forEach(([id,scale])=>{
    const btns=[...grid.querySelectorAll('.scale-btn')];
    const btn=btns.find(b=>b.innerHTML.includes(scale.name));
    if(!btn)return;
    const active=state.selectedScale===id;
    btn.classList.toggle('active',active);
    btn.style.borderColor=active?scale.color:'#2a2a2a';
    btn.style.background=active?scale.color+'22':'#1a1a1a';
    btn.style.color=active?scale.color:'#666';
  });
}

// ─── Metronome ────────────────────────────────────────────────────────
let metroAudioCtx = null;
let metroInterval = null;
let metroTick = 0;
let metroStartTime = 0;

function getMetroCtx(){
  if(!metroAudioCtx) metroAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return metroAudioCtx;
}

function metroClick(accent){
  const ctx = getMetroCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.value = accent ? 880 : 660;
  gain.gain.setValueAtTime(accent ? 0.14 : 0.09, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
  osc.start(); osc.stop(ctx.currentTime + 0.06);
}

function metroStep(){
  if(!state.metroPlaying) return;
  const interval = 60000 / state.metroBpm;
  metroTick++;
  metroClick(metroTick % 4 === 1); // accent on beat 1
  document.getElementById('metro-beat-dot').classList.toggle('on', metroTick % 2 === 0);
  const elapsed = performance.now() - metroStartTime;
  const nextDelay = interval * metroTick - elapsed;
  metroInterval = setTimeout(metroStep, Math.max(0, nextDelay));
}

function startMetro(){
  state.metroPlaying = true;
  metroTick = 0;
  metroStartTime = performance.now();
  document.getElementById('metro-play').className = 'metro-btn metro-on';
  document.getElementById('metro-play').textContent = '⏹ Metro';
  metroStep();
}

function stopMetro(){
  state.metroPlaying = false;
  clearTimeout(metroInterval);
  document.getElementById('metro-play').className = 'metro-btn';
  document.getElementById('metro-play').textContent = '▶ Metro';
  document.getElementById('metro-beat-dot').classList.remove('on');
}

document.getElementById('metro-play').addEventListener('click',()=>{ if(state.metroPlaying) stopMetro(); else startMetro(); });
document.getElementById('metro-down').addEventListener('click',()=>{ state.metroBpm=Math.max(20,state.metroBpm-5); document.getElementById('metro-bpm-val').textContent=state.metroBpm; });
document.getElementById('metro-up').addEventListener('click',()=>{ state.metroBpm=Math.min(200,state.metroBpm+5); document.getElementById('metro-bpm-val').textContent=state.metroBpm; });

// ─── Mode tabs ───────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    state.mode=tab.dataset.mode;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    state.positionIdx=0;
    render();
  });
});

// ─── Init ─────────────────────────────────────────────────────────────
loadCustomScales();  // apply any saved overrides before rendering
initFretboard();

// SVG click → edit / calc mode
document.getElementById('fretboard').addEventListener('click',function(e){
  if(state.mode!=='edit'&&state.mode!=='calc') return;
  const rect=this.getBoundingClientRect();
  const scaleX=SVG_W/rect.width, scaleY=SVG_H/rect.height;
  const svgX=(e.clientX-rect.left)*scaleX, svgY=(e.clientY-rect.top)*scaleY;
  if(state.mode==='edit') handleFretClick(svgX,svgY);
  else handleCalcClick(svgX,svgY);
});

buildScaleButtons();
render();

// Progress
const p=JSON.parse(localStorage.getItem('maru_progress_escalas')||'{}');
p.visited=true;p.pct=p.pct||5;
localStorage.setItem('maru_progress_escalas',JSON.stringify(p));
</script>
